<thead>
<tr>
<th>Lab</th>
<th>What you build</th>

</tr>
<tr>

</blockquote>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="why-matlab">Why MATLAB?</h2>
<ul>
<li><strong>Matrix-native:</strong> sensors produce arrays; MATLAB thinks in arrays</li>
<li><strong>Industry standard:</strong> mechanical, civil, biomedical, aerospace</li>
<li><strong>Tight formula-to-code loop:</strong></li>
</ul>
<pre><code class="language-matlab">resultant = <span class="hljs-built_in">sqrt</span>(Ax.^<span class="hljs-number">2</span> + Ay.^<span class="hljs-number">2</span> + Az.^<span class="hljs-number">2</span>);
</code></pre>
<ul>
<li><strong>MATLAB Online:</strong> no install, runs in browser, pairs with MATLAB Mobile</li>
<li>Not &quot;better than Python&quot; — the right tool for this domain</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="the-ai-partnership-model">The AI Partnership Model</h2>
<p>AI is part of this course. Not hidden. Not banned.</p>
<p><strong>Two tools:</strong> MATLAB Copilot + Gemini (UC Davis access)</p>
<p><strong>The rule:</strong></p>
<blockquote>
<p>After any AI interaction — can you explain what it produced in your own words?</p>
</blockquote>
<p>If no → the AI did your thinking, not you.</p>
<p><strong>Lab evaluations:</strong> proctored, no AI access.<br />
That is where you prove you own the understanding.</p>
</section>

<h2 id="failure-is-the-method">Failure Is the Method</h2>
<p>This is a <strong>flipped classroom.</strong> You will be wrong in front of your team. Or, you may be the only one right....</p>
<p>That is the design.</p>
<ul>
<li>No iClicker — hand-raise responses</li>
<li>No grade attached to being wrong here</li>
<li>Every activity is calibrated so incorrect first attempts are the <strong>norm</strong></li>
</ul>
<blockquote>
<p>&quot;Raise your hand if your team got a different answer than you expected.&quot;</p>
</blockquote>
<p>The moment you work through being wrong — that is the moment it sticks.</p>
</section>

<h2 id="assignment-is-a-snapshot-1">Assignment Is a Snapshot</h2>
<pre><code class="language-matlab">x = <span class="hljs-number">3</span>;
y = x + <span class="hljs-number">2</span>;   <span class="hljs-comment">% What is y?</span>
x = <span class="hljs-number">10</span>;      <span class="hljs-comment">% What is y now?</span>
</code></pre>
<p><strong>What value does <code>y</code> hold after <code>x = 10</code>?</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="assignment-is-a-snapshot-2">Assignment Is a Snapshot</h2>
<pre><code class="language-matlab">x = <span class="hljs-number">3</span>;
y = x + <span class="hljs-number">2</span>;   <span class="hljs-comment">% y ← 5  (snapshot taken here)</span>
x = <span class="hljs-number">10</span>;      <span class="hljs-comment">% x changes — but y does not</span>
</code></pre>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="legal-variable-name-rules-summary">Legal Variable-Name Rules (Summary)</h2>
<ul>
<li>Must <strong>start with a letter</strong> (A–Z, a–z)</li>
<li>Can contain letters, digits, and underscore (<code>_</code>) after the first character</li>
<li><strong>Case-sensitive:</strong> <code>Velocity</code> ≠ <code>velocity</code></li>
<li>Maximum length = <code>namelengthmax</code></li>
<li>Cannot be a MATLAB keyword (<code>if</code>, <code>for</code>, <code>end</code>, etc.)</li>
<li>Avoid names that shadow built-in functions (e.g., <code>size</code>, <code>sum</code>)</li>
</ul>
<p><em>Ask MATLAB Copilot: &quot;Give me five examples of valid and invalid MATLAB variable names and explain why.&quot;</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="numbers-and-display">Numbers and Display</h2>
<ul>
<li>Default type: <code>double</code> (64-bit floating point) — MATLAB <strong>never</strong> does integer division</li>
<li>Semicolon <strong>suppresses</strong> output: <code>x = 5;</code> prints nothing; <code>x = 5</code> prints the value</li>
</ul>
<pre><code class="language-matlab">x = <span class="hljs-number">5</span>        <span class="hljs-comment">% prints: x = 5</span>
x = <span class="hljs-number">5</span>;       <span class="hljs-comment">% prints: nothing</span>
<span class="hljs-built_in">disp</span>(x)      <span class="hljs-comment">% prints: 5</span>
</code></pre>
<p><code>format long</code> reveals the full floating-point representation:</p>
<pre><code>&gt;&gt; x = 7/2
x =
    3.5000
&gt;&gt; format long
&gt;&gt; x = 7/2
x =
   3.500000000000000
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="operator-precedence">Operator Precedence</h2>
<p>Order: <strong>( )</strong> → <strong>^</strong> → <strong>× ÷</strong> → <strong>+ −</strong>    <em>(left to right within each level)</em></p>
<pre><code class="language-matlab"><span class="hljs-number">2</span> + <span class="hljs-number">3</span> * <span class="hljs-number">4</span>    <span class="hljs-comment">% → 14, not 20</span>
<span class="hljs-number">2</span>^<span class="hljs-number">3</span>^<span class="hljs-number">2</span>        <span class="hljs-comment">% → 64  (left-to-right: (2^3)^2)</span>
</code></pre>
<p><strong>Mnemonic — PEMDAS:</strong></p>
<blockquote>
<p><strong>P</strong>arentheses · <strong>E</strong>xponent · <strong>M</strong>ultiply/<strong>D</strong>ivide · <strong>A</strong>dd/<strong>S</strong>ubtract<br />
<em>&quot;Please Excuse My Dear Aunt Sally&quot;</em></p>
</blockquote>
<p>When in doubt: <strong>use parentheses.</strong> Explicit beats clever.</p>
<p><em>Use MATLAB Copilot to test your understanding: try an expression and ask Copilot to explain the evaluation order.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="built-in-constants">Built-In Constants</h2>
<table>
<thead>
<tr>
<th>Symbol</th>
<th>Value</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>pi</code></td>
<td>3.14159…</td>
</tr>
<tr>
<td><code>exp(1)</code></td>
<td>e = 2.71828…</td>
</tr>
<tr>
<td><code>Inf</code></td>
<td>Infinity</td>
</tr>
<tr>
<td><code>NaN</code></td>
<td>Not a Number (result of <code>0/0</code>)</td>
</tr>
<tr>
<td><code>eps</code></td>
<td>Smallest floating-point increment</td>
</tr>
</tbody>
</table>
<p><code>NaN</code> propagates — any operation involving <code>NaN</code> returns <code>NaN</code></p>
<p><code>Inf - Inf</code> → <code>NaN</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="common-mathematical-functions">Common Mathematical Functions</h2>
<table>
<thead>
<tr>
<th>Function</th>
<th>What it does</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>sqrt(x)</code></td>
<td>Square root</td>
</tr>
<tr>
<td><code>abs(x)</code></td>
<td>Absolute value</td>
</tr>
<tr>
<td><code>floor(x)</code> / <code>ceil(x)</code></td>
<td>Round toward −∞ / +∞</td>
</tr>
<tr>
<td><code>mod(a, b)</code></td>
<td>Remainder after division</td>
</tr>
<tr>
<td><code>sin(x)</code>, <code>cos(x)</code></td>
<td>Trig (radians)</td>
</tr>
<tr>
<td><code>log(x)</code></td>
<td>Natural log</td>
</tr>
</tbody>
</table>
<div style="background:#FEFAE8; border-left:4px solid #C99700; padding:6px 14px; border-radius:4px; font-size:18px; margin-top:8px;">
<strong>mod reminder:</strong>&nbsp;
<code>mod(7, 2) → 1</code> &nbsp;(7 = 3×2 + <strong>1</strong>) &nbsp;|&nbsp;
<code>mod(9, 4) → 1</code> &nbsp;(9 = 2×4 + <strong>1</strong>) &nbsp;|&nbsp;
<code>mod(8, 4) → 0</code> &nbsp;(evenly divisible)
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="the-floating-point-trap">The Floating-Point Trap</h2>
<pre><code class="language-matlab"><span class="hljs-built_in">sqrt</span>(<span class="hljs-number">2</span>)^<span class="hljs-number">2</span> == <span class="hljs-number">2</span>    <span class="hljs-comment">% Returns 0 — false!</span>
</code></pre>
<ul>
<li><code>sqrt(2)</code> is stored as an approximation</li>
<li>Squaring that approximation does not recover exactly 2</li>
<li><strong>Never use <code>==</code> to compare floating-point results</strong></li>
<li>Use <code>abs(a - b) &lt; tolerance</code> instead</li>
</ul>
<p>This is not a MATLAB quirk — it is how all floating-point hardware works.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="vs-"><code>=</code> vs <code>==</code></h2>
<pre><code class="language-matlab">x = <span class="hljs-number">5</span>      <span class="hljs-comment">% Assignment: put 5 in x</span>
x == <span class="hljs-number">5</span>     <span class="hljs-comment">% Comparison: is x equal to 5? Returns 1 or 0</span>
</code></pre>
<p><code>=</code> <strong>changes</strong> the world.    <code>==</code> <strong>asks a question</strong> about it.</p>
<p>MATLAB will error on <code>if x = 5</code> — it catches the mistake.</p>
<p><strong>Common error:</strong> using <code>=</code> inside a condition.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-class="activity" data-theme="eng6" lang="en-US" class="activity" data-marpit-pagination="24" style="--paginate:true;--class:activity;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="team-activity-1-predict--discuss">Team Activity 1: Predict &amp; Discuss</h2>
<p><strong>Teams of 3–4  |  15 min working + 5 min debrief</strong></p>
<ol>
<li>Open the handout</li>
<li>For each expression: <strong>reason through it as a team and write your prediction</strong></li>
<li>Write the reasoning your team used — even if you're not sure</li>
<li>Mark anything your team disagrees on with <strong>★</strong></li>
</ol>
<blockquote>
<p><strong>Rule: discuss first, always.</strong><br />
The goal is the reasoning, not the answer.<br />
<strong>Do not open MATLAB during this activity.</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="debrief-activity-1">Debrief: Activity 1</h2>
<blockquote>
<p>&quot;Raise your hand if your team got at least one wrong.&quot;<br />
<em>(Expected: nearly all hands)</em></p>
</blockquote>
<p>&quot;Which one surprised you most? Why did you predict what you predicted?&quot;</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="26" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="38">
<h1 id="scripts--working-directory">Scripts &amp; Working Directory</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="why-scripts-exist">Why Scripts Exist</h2>
<p>Command Window: type a command → result → gone.</p>
<p>A <strong>script</strong> is a <code>.m</code> file containing commands executed top to bottom.</p>
<ul>
<li>Repeatable</li>
<li>Shareable</li>
<li>Debuggable</li>
</ul>
<blockquote>
<p>A script is a record of your work — documentation and automation simultaneously.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="creating-and-running-a-script">Creating and Running a Script</h2>
<ol>
<li><strong>Home tab → New Script</strong> (or <code>Ctrl+N</code>)</li>
<li>Type your commands</li>
<li><strong>Save</strong> with a meaningful name: <code>logging.m</code>, not <code>untitled3.m</code></li>
<li>Click <strong>Run</strong> (or <code>F5</code>)</li>
</ol>
<p>MATLAB runs the script in the context of the <strong>Current Folder.</strong></p>
<p>If a file the script needs is elsewhere → error.</p>
</section>

<h2 id="comments-and-clear-code">Comments and Clear Code</h2>
<pre><code class="language-matlab"><span class="hljs-comment">% This is a comment — MATLAB ignores everything after %</span>
x = <span class="hljs-number">9.81</span>;   <span class="hljs-comment">% gravitational acceleration (m/s^2)</span>
</code></pre>
<ul>
<li>Comments are for <strong>humans</strong>, not MATLAB</li>
<li>A comment should explain <strong>why</strong>, not just what</li>
</ul>
<pre><code class="language-matlab">x = <span class="hljs-number">9.81</span>;   <span class="hljs-comment">% set x to 9.81               &lt;- useless</span>
x = <span class="hljs-number">9.81</span>;   <span class="hljs-comment">% gravitational accel (m/s^2)  &lt;- useful</span>
</code></pre>
<p>Code without comments is not finished code.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="32" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="mini-project-1-the-logging-script">Mini-Project 1: The Logging Script</h2>
<pre><code class="language-matlab">m = mobiledev;           <span class="hljs-comment">% connect to MATLAB Mobile on your phone</span>
m.Logging = <span class="hljs-number">1</span>;           <span class="hljs-comment">% start recording accelerometer data</span>
pause(<span class="hljs-number">10</span>);               <span class="hljs-comment">% collect for 10 seconds</span>
m.Logging = <span class="hljs-number">0</span>;           <span class="hljs-comment">% stop recording</span>
accelData = accellog(m); <span class="hljs-comment">% retrieve data as a matrix</span>
whos
</code></pre>
<p>After running, <code>whos</code> shows everything in the workspace:</p>
<pre><code> Name        Size      Bytes  Class
 accelData   101x4       808  double
 m             1x1         8  mobilesensor.internal.mobiledev
</code></pre>
<p><code>accellog(m)</code> returns a <strong>101-row × 4-column matrix</strong> — one row per time sample.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="accessing-columns-of-acceldata">Accessing Columns of accelData</h2>
<pre><code class="language-matlab">xAccel = accelData(:, <span class="hljs-number">1</span>);   <span class="hljs-comment">% all rows, column 1 → X axis</span>
yAccel = accelData(:, <span class="hljs-number">2</span>);   <span class="hljs-comment">% Y axis</span>
zAccel = accelData(:, <span class="hljs-number">3</span>);   <span class="hljs-comment">% Z axis</span>
t      = accelData(:, <span class="hljs-number">4</span>);   <span class="hljs-comment">% timestamps</span>
</code></pre>
<ul>
<li><code>:</code> means &quot;all rows&quot; — take every row from this column</li>
<li>Columns = <strong>[X, Y, Z, timestamp]</strong> — four separate signals stacked side by side</li>
<li>Each extracted variable is a 101-element column of numbers</li>
</ul>
<p><em>Full indexing syntax covered in L2 and L3.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-class="activity" data-theme="eng6" lang="en-US" class="activity" data-marpit-pagination="34" style="--paginate:true;--class:activity;--theme:eng6;" data-marpit-pagination-total="38">
<h2 id="team-activity-2-annotate-the-script">Team Activity 2: Annotate the Script</h2>
<p><strong>Teams of 3–4  |  15 min working + 5 min debrief</strong></p>
<p>You have a copy of <code>logging.m</code> with two blank columns:</p>
<ul>
<li><strong>What does this line do?</strong> (plain English)</li>
<li><strong>Why must it be in this position?</strong> (what breaks if it moves?)</li>
</ul>
<p>Work through every line.</p>
<p>When you cannot explain a line, write: <em>&quot;unknown — research target.&quot;</em></p>
</section>
