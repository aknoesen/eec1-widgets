<pre><code class="language-matlab">x = <span class="hljs-number">5</span>;
x &gt; <span class="hljs-number">0</span> &amp;&amp; x &lt; <span class="hljs-number">10</span>    <span class="hljs-comment">% true — stops at first false</span>
x &gt; <span class="hljs-number">0</span> &amp; x &lt; <span class="hljs-number">10</span>     <span class="hljs-comment">% true — evaluates both sides</span>
~(x &gt; <span class="hljs-number">10</span>)          <span class="hljs-comment">% true</span>
</code></pre>

<h2 id="raise-your-hand-3">Raise Your Hand</h2>
<blockquote>
<p>&quot;What does <code>true + true</code> return?&quot;</p>
</blockquote>
<p><strong>(a)</strong> an error     <strong>(b)</strong> <code>2</code>     <strong>(c)</strong> <code>true</code> — <em>hands up</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="true--true-returns-2"><code>true + true</code> Returns <code>2</code></h2>
<ul>
<li>In an arithmetic expression, MATLAB promotes <code>logical</code> to <code>double</code></li>
<li>This is <strong>not</strong> a bug — it is a feature we will use deliberately</li>
</ul>
<blockquote>
<p><strong><code>sum</code> — built-in function that adds all elements:</strong></p>
<pre><code class="language-matlab">sum([<span class="hljs-number">3</span>, <span class="hljs-number">7</span>, <span class="hljs-number">2</span>, <span class="hljs-number">8</span>])                    <span class="hljs-comment">% → 20  (numeric array)</span>
sum([<span class="hljs-built_in">true</span>, <span class="hljs-built_in">false</span>, <span class="hljs-built_in">true</span>, <span class="hljs-built_in">true</span>])        <span class="hljs-comment">% → 3   (logical: true=1, false=0)</span>
</code></pre>
</blockquote>
<ul>
<li>So <code>sum(array &gt; threshold)</code> counts how many elements exceed a threshold:
<ul>
<li><code>array &gt; threshold</code> → logical array (<code>true</code> where condition holds)</li>
<li><code>sum(...)</code> → number of <code>true</code> values = number of elements above threshold</li>
</ul>
</li>
</ul>
</section>

<h2 id="the-off-by-one-trap-3">The Off-by-One Trap</h2>
<pre><code class="language-matlab">t = <span class="hljs-number">0</span>:<span class="hljs-number">0.01</span>:<span class="hljs-number">10</span>;
<span class="hljs-built_in">length</span>(t)           <span class="hljs-comment">% → ?</span>
</code></pre>
<blockquote>
<p>&quot;How many elements does <code>0:0.01:10</code> produce?&quot;</p>
</blockquote>
<p><strong>(a)</strong> 1001     <strong>(b)</strong> 1000     <strong>(c)</strong> not sure — <em>hands up</em></p>
</section>

<h2 id="these-two-are-not-the-same">These Two Are Not the Same</h2>
<pre><code class="language-matlab">t = <span class="hljs-number">0</span>:<span class="hljs-number">0.01</span>:<span class="hljs-number">9.99</span>    <span class="hljs-comment">% → 1000 elements  ✓  your MP2 timestamp vector</span>
t = <span class="hljs-number">0</span>:<span class="hljs-number">0.01</span>:<span class="hljs-number">10</span>      <span class="hljs-comment">% → 1001 elements  ✗</span>
</code></pre>
</section>

<h1 id="1d-array-indexing">1D Array Indexing</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="31" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="single-element--end">Single Element + <code>end</code></h2>
<pre><code class="language-matlab">Ax = [<span class="hljs-number">2.1</span>, <span class="hljs-number">-0.4</span>, <span class="hljs-number">3.5</span>, <span class="hljs-number">1.2</span>, <span class="hljs-number">-1.8</span>];

Ax(<span class="hljs-number">1</span>)       <span class="hljs-comment">% → 2.1       first element</span>
Ax(<span class="hljs-number">3</span>)       <span class="hljs-comment">% → 3.5       third element</span>
Ax(<span class="hljs-keyword">end</span>)     <span class="hljs-comment">% → -1.8      last element</span>
Ax(<span class="hljs-keyword">end</span><span class="hljs-number">-1</span>)   <span class="hljs-comment">% → 1.2       second-to-last</span>
</code></pre>
<ul>
<li><code>end</code> always resolves to the <strong>length of the array being indexed</strong></li>
<li>Works in expressions: <code>end-1</code>, <code>end-4</code>, <code>ceil(end/2)</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="32" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="range-indexing">Range Indexing</h2>
<pre><code class="language-matlab">Ax = [<span class="hljs-number">2.1</span>, <span class="hljs-number">-0.4</span>, <span class="hljs-number">3.5</span>, <span class="hljs-number">1.2</span>, <span class="hljs-number">-1.8</span>];

Ax(<span class="hljs-number">2</span>:<span class="hljs-number">4</span>)         <span class="hljs-comment">% → [-0.4,  3.5,  1.2]    elements 2 through 4</span>
Ax(<span class="hljs-number">1</span>:<span class="hljs-number">2</span>:<span class="hljs-keyword">end</span>)     <span class="hljs-comment">% → [ 2.1,  3.5, -1.8]    every other element</span>
Ax(<span class="hljs-keyword">end</span><span class="hljs-number">-2</span>:<span class="hljs-keyword">end</span>)   <span class="hljs-comment">% → [ 3.5,  1.2, -1.8]    last 3 elements</span>
</code></pre>
<ul>
<li>The index <code>2:4</code> is itself an array: <code>[2, 3, 4]</code></li>
<li>Same colon rules as array construction — step included</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="35" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="out-of-bounds-2">Out of Bounds</h2>
<pre><code class="language-matlab">Ax = [<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>];
Ax(<span class="hljs-number">5</span>)    <span class="hljs-comment">% → Error: Index in position 1 exceeds array bounds.</span>
</code></pre>
<ul>
<li>MATLAB throws an <strong>explicit error</strong> — not silent behavior</li>
<li>In C, this would be a memory overrun. MATLAB protects you.</li>
</ul>
<blockquote>
<p>&quot;Raise your hand if your team has already encountered this error&quot;</p>
</blockquote>
<p><strong>(a)</strong> yes     <strong>(b)</strong> not yet — <em>hands up</em></p>
</section>

<li>Result contains only elements where the mask is <code>true</code></li>

<h2 id="one-line-peak-detection">One-Line Peak Detection</h2>
<pre><code class="language-matlab">threshold = <span class="hljs-number">15</span>;   <span class="hljs-comment">% m/s^2</span>

peaks   = resultant(resultant &gt; threshold);   <span class="hljs-comment">% values above threshold</span>
t_peaks = t(resultant &gt; threshold);           <span class="hljs-comment">% timestamps of those peaks</span>
</code></pre>
<ul>
<li>Apply the <strong>same mask</strong> to both the data array and the time array</li>
<li>No loop needed — MATLAB processes the entire signal at once</li>
<li><em>This is your MP2 peak detection code</em></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="47" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="counting-events-with-sum">Counting Events with <code>sum</code></h2>
<pre><code class="language-matlab">mask = Ax &gt; <span class="hljs-number">1</span>;
sum(mask)          <span class="hljs-comment">% how many elements exceeded 1?</span>
</code></pre>
<ul>
<li><code>sum</code> on a logical array counts the <strong>number of <code>true</code> values</strong></li>
<li>Pattern: <code>sum(array &gt; threshold)</code> → number of events, one expression</li>
<li>Connects back to Slide 5: <code>true + true = 2</code> — MATLAB promotes to double</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-class="activity" data-theme="eng6" lang="en-US" class="activity" data-marpit-pagination="48" style="--paginate:true;--class:activity;--theme:eng6;" data-marpit-pagination-total="51">

<p><strong>Teams of 3–4 | 10 min working + 5 min debrief</strong></p>

</code></pre>

<h2 id="activity-2-debrief">Activity 2 Debrief</h2>
<blockquote>
<p>&quot;How many different approaches did teams use for the timestamp-of-maximum challenge?&quot;</p>
</blockquote>
<p>Collect 2–3 approaches — common ones:</p>
<pre><code class="language-matlab">t(resultant == <span class="hljs-built_in">max</span>(resultant))
[~, idx] = <span class="hljs-built_in">max</span>(resultant);  t(idx)
t(<span class="hljs-built_in">find</span>(resultant == <span class="hljs-built_in">max</span>(resultant)))
</code></pre>
<ul>
<li>All work. The <code>[~, idx] = max(resultant)</code> pattern appears most in MP2 — formalized in L3.</li>
</ul>
<blockquote>
<p>&quot;Raise your hand if logical indexing felt: (a) natural, (b) I can follow it but not write it yet, (c) still confused&quot;</p>
</blockquote>
<p>Expected: roughly equal across all three — all are fine at this stage.</p>
</section>
