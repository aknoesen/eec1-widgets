<h1 id="2d-array-mental-model">2D Array Mental Model</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="anatomy-of-a-2d-array">Anatomy of a 2D Array</h2>
<pre><code>         col 1   col 2   col 3
row 1  [   1       2       3  ]
row 2  [   4       5       6  ]
row 3  [   7       8       9  ]
</code></pre>
<ul>
<li>Rows run <strong>horizontally</strong>; columns run <strong>vertically</strong></li>
<li>Address any element with two coordinates: <strong>(row, column)</strong></li>
<li><span style="color:#CC0000; font-weight:bold;">Row index comes first — this is not (x, y) order</span></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="from-a-row-to-a-grid">From a Row to a Grid</h2>
<p>A 1D array is one row of values:</p>
<pre><code class="language-matlab">v = [<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>, <span class="hljs-number">4</span>, <span class="hljs-number">5</span>]   <span class="hljs-comment">% 1x5</span>
</code></pre>
<p>A 2D array has <strong>rows and columns</strong>:</p>
<pre><code class="language-matlab">A = [<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>;
     <span class="hljs-number">4</span>, <span class="hljs-number">5</span>, <span class="hljs-number">6</span>;
     <span class="hljs-number">7</span>, <span class="hljs-number">8</span>, <span class="hljs-number">9</span>]          <span class="hljs-comment">% 3x3</span>
</code></pre>
<ul>
<li>Semicolons <strong>inside</strong> <code>[ ]</code> separate rows</li>
<li>MATLAB fills left-to-right, row by row</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="12" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="raise-your-hand-5">Raise Your Hand</h2>
<blockquote>
<p>&quot;To create a 2D array, did you already know that MATLAB fills left-to-right, row by row?&quot;</p>
</blockquote>
<p><strong>(a)</strong> Yes, I assumed that     <strong>(b)</strong> No, I assumed something else — <em>hands up</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="inspecting-a-2d-array-1">Inspecting a 2D Array</h2>
<p>For <code>A = [1, 2, 3; 4, 5, 6; 7, 8, 9]</code> — a <strong>3×3</strong> matrix:</p>
<pre><code class="language-matlab"><span class="hljs-built_in">size</span>(A)       <span class="hljs-comment">% [3, 3]  — rows × cols as a 1×2 vector</span>
<span class="hljs-built_in">size</span>(A, <span class="hljs-number">1</span>)    <span class="hljs-comment">% 3       — number of rows</span>
<span class="hljs-built_in">size</span>(A, <span class="hljs-number">2</span>)    <span class="hljs-comment">% 3       — number of columns</span>
</code></pre>
<p><code>size(A, 1)</code> and <code>size(A, 2)</code> are the forms you will use most — they give you one number at a time.</p>
<p><em><code>numel</code>, <code>length</code>, and the traps they hide are covered in L5.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="the-sensor-matrix-is-a-2d-array">The Sensor Matrix is a 2D Array</h2>
<pre><code class="language-matlab">data = accellog(m);   <span class="hljs-comment">% returns a 2D array — not a 1D array</span>
</code></pre>
<ul>
<li>L2–L3 worked with 1D arrays for individual signals</li>
<li>MP2 delivers all signals in <strong>one matrix variable</strong></li>
<li>Your job: extract the columns you need</li>
</ul>
<p><em>How to do that is the topic of the next segment.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="concatenation">Concatenation</h2>
<pre><code class="language-matlab">A = [<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>];    <span class="hljs-comment">% 1×3</span>
B = [<span class="hljs-number">4</span>, <span class="hljs-number">5</span>, <span class="hljs-number">6</span>];    <span class="hljs-comment">% 1×3</span>

C = [A, B]        <span class="hljs-comment">% horizontal: 1×6  — needs same row count</span>
D = [A; B]        <span class="hljs-comment">% vertical:   2×3  — needs same column count</span>
</code></pre>
<ul>
<li>Dimension mismatch → <code>&quot;Dimensions of arrays being concatenated are not consistent&quot;</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="raise-your-hand-8">Raise Your Hand</h2>
<p><code>A = [1, 2, 3];</code>   <code>B = [4, 5, 6];</code></p>
<blockquote>
<p>&quot;Does <code>[A, B]</code> concatenate horizontally or vertically?&quot;</p>
</blockquote>
<p><strong>(a)</strong> Vertically — adds rows     <strong>(b)</strong> Horizontally — adds columns — <em>hands up</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="a-b-concatenates-horizontally"><code>[A, B]</code> Concatenates Horizontally</h2>
<pre><code class="language-matlab">A = [<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>];    <span class="hljs-comment">% 1×3</span>
B = [<span class="hljs-number">4</span>, <span class="hljs-number">5</span>, <span class="hljs-number">6</span>];    <span class="hljs-comment">% 1×3</span>

[A, B]   <span class="hljs-comment">% → [1, 2, 3, 4, 5, 6]   1×6</span>
[A; B]   <span class="hljs-comment">% → [1, 2, 3;            2×3</span>
<span class="hljs-comment">%              4, 5, 6]</span>
</code></pre>
<div style="font-size:1.15em; margin-top:0.6em; line-height:2;">
<p><strong><code>,</code></strong>  →  side by side  →  <strong>more columns</strong></p>
<p><strong><code>;</code></strong>  →  stacked  →  <strong>more rows</strong></p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="two-index-addressing-arow-col">Two-Index Addressing: A(row, col)</h2>
<pre><code class="language-matlab">A = [<span class="hljs-number">10</span>, <span class="hljs-number">20</span>, <span class="hljs-number">30</span>;
     <span class="hljs-number">40</span>, <span class="hljs-number">50</span>, <span class="hljs-number">60</span>;
     <span class="hljs-number">70</span>, <span class="hljs-number">80</span>, <span class="hljs-number">90</span>];

A(<span class="hljs-number">2</span>, <span class="hljs-number">3</span>)    <span class="hljs-comment">% → 60   (row 2, column 3)</span>
A(<span class="hljs-number">1</span>, <span class="hljs-number">1</span>)    <span class="hljs-comment">% → 10   (top-left corner)</span>
A(<span class="hljs-number">3</span>, <span class="hljs-number">2</span>)    <span class="hljs-comment">% → 80</span>
</code></pre>
<ul>
<li>Always: <strong>row first, column second</strong></li>
<li>Think: &quot;down first, then across&quot;</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="22" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="59">
<h1 id="row-and-column-indexing">Row and Column Indexing</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="extracting-a-full-row-or-column">Extracting a Full Row or Column</h2>
<pre><code class="language-matlab">A = [<span class="hljs-number">10</span>, <span class="hljs-number">20</span>, <span class="hljs-number">30</span>;
     <span class="hljs-number">40</span>, <span class="hljs-number">50</span>, <span class="hljs-number">60</span>;
     <span class="hljs-number">70</span>, <span class="hljs-number">80</span>, <span class="hljs-number">90</span>];

row = <span class="hljs-number">2</span>;
col = <span class="hljs-number">3</span>;

A(row, :)    <span class="hljs-comment">% entire row 2    → [40, 50, 60]   (1×3)</span>
A(:, col)    <span class="hljs-comment">% entire column 3 → [30; 60; 90]   (3×1)</span>
</code></pre>
<ul>
<li>The <code>:</code> means <strong>all</strong> — &quot;give me everything in this dimension&quot;</li>
<li><code>A(row, :)</code> → row vector</li>
<li><code>A(:, col)</code> → column vector</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="the-mp2-unlock-operation">The MP2 Unlock Operation</h2>
<pre><code class="language-matlab">Ax = data(:, <span class="hljs-number">1</span>);   <span class="hljs-comment">% all rows, column 1  →  X-axis signal</span>
Ay = data(:, <span class="hljs-number">2</span>);   <span class="hljs-comment">% all rows, column 2  →  Y-axis signal</span>
Az = data(:, <span class="hljs-number">3</span>);   <span class="hljs-comment">% all rows, column 3  →  Z-axis signal</span>
t  = data(:, <span class="hljs-number">4</span>);   <span class="hljs-comment">% all rows, column 4  →  timestamps</span>
</code></pre>
<ul>
<li><strong>Four lines.</strong> That is the entire unlock.</li>
<li>You now have four 1D arrays — everything from L2–L3 applies</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="submatrices-and-ranges">Submatrices and Ranges</h2>
<pre><code class="language-matlab">A = [<span class="hljs-number">10</span>, <span class="hljs-number">20</span>, <span class="hljs-number">30</span>;
     <span class="hljs-number">40</span>, <span class="hljs-number">50</span>, <span class="hljs-number">60</span>;
     <span class="hljs-number">70</span>, <span class="hljs-number">80</span>, <span class="hljs-number">90</span>];

A(<span class="hljs-number">1</span>:<span class="hljs-number">2</span>, <span class="hljs-number">2</span>:<span class="hljs-number">3</span>)    <span class="hljs-comment">% rows 1–2, columns 2–3  →  2×2</span>
A(<span class="hljs-keyword">end</span>, :)      <span class="hljs-comment">% last row               →  1×3</span>
A(:, <span class="hljs-keyword">end</span>)      <span class="hljs-comment">% last column            →  3×1</span>
A(<span class="hljs-keyword">end</span>, <span class="hljs-keyword">end</span>)    <span class="hljs-comment">% bottom-right element   →  scalar</span>
</code></pre>
<div style="color:#002855; font-weight:bold; font-size:0.88em; margin-top:0.1em;">
← [2] × [2] &emsp;&emsp; ← [1] × [3] &emsp;&emsp; ← [3] × [1]
</div>
<div style="color:#002855; font-weight:bold; font-size:0.9em; margin-top:0.25em;">
Size rule: [length of row range] × [length of col range]
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">

<h1 id="logical-indexing-on-2d-arrays">Logical Indexing on 2D Arrays</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="recap-logical-indexing-in-1d">Recap: Logical Indexing in 1D</h2>
<pre><code class="language-matlab">Ax = [<span class="hljs-number">0.3</span>, <span class="hljs-number">2.1</span>, <span class="hljs-number">-0.5</span>, <span class="hljs-number">3.4</span>, <span class="hljs-number">1.2</span>];
mask = Ax &gt; <span class="hljs-number">1</span>;      <span class="hljs-comment">% [0, 1, 0, 1, 1]  — logical array</span>
Ax(mask)            <span class="hljs-comment">% [2.1, 3.4, 1.2]  — values where true</span>
</code></pre>
<ul>
<li>A logical array is a <strong>mask</strong> — passes through elements where <code>true</code></li>
<li>L2 used this on 1D arrays</li>
<li>New question: what if we want to keep <strong>entire rows</strong> based on a column condition?</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="35" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="logical-row-selection-in-2d">Logical Row Selection in 2D</h2>
<p>Start with a simple example:</p>
<pre><code class="language-matlab">A = [<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>;
     <span class="hljs-number">4</span>, <span class="hljs-number">5</span>, <span class="hljs-number">6</span>;
     <span class="hljs-number">7</span>, <span class="hljs-number">8</span>, <span class="hljs-number">9</span>];

A(:, <span class="hljs-number">1</span>) &gt; <span class="hljs-number">3</span>           <span class="hljs-comment">% [0; 1; 1]  — logical column vector</span>
A(A(:, <span class="hljs-number">1</span>) &gt; <span class="hljs-number">3</span>, :)     <span class="hljs-comment">% [4, 5, 6;  — rows where col 1 &gt; 3</span>
                      <span class="hljs-comment">%  7, 8, 9]</span>
</code></pre>
<p>Read in two parts:</p>
<ol>
<li><code>A(:, 1) &gt; 3</code> — compare every element of column 1 to 3 → logical column vector</li>
<li>Use that vector as a <strong>row selector</strong> — keep all columns (<code>:</code>) where <code>true</code></li>
</ol>
<p>The same pattern on <code>data</code>:</p>
<pre><code class="language-matlab">data(data(:, <span class="hljs-number">1</span>) &gt; <span class="hljs-number">2</span>, :)   <span class="hljs-comment">% rows where col 1 &gt; 2</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="37" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="what-size-is-the-result">What Size Is the Result?</h2>
<pre><code class="language-matlab">mask   = data(:, <span class="hljs-number">1</span>) &gt; <span class="hljs-number">2</span>;     <span class="hljs-comment">% 500×1 logical</span>
sum(mask)                     <span class="hljs-comment">% 127  (data-dependent)</span>
result = data(mask, :);       <span class="hljs-comment">% 127×4</span>
</code></pre>
<ul>
<li>Result rows = number of <code>true</code> entries in the mask</li>
<li>Result columns = all columns (because <code>:</code> was used)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="41" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="raise-your-hand-15">Raise Your Hand</h2>
<blockquote>
<p>&quot;Does the result of <code>data(mask, :)</code> always have 500 rows?&quot;</p>
</blockquote>
<p><strong>(a)</strong> Yes — it always has 500 rows     <strong>(b)</strong> No — it depends on the data     <strong>(c)</strong> Not sure — <em>hands up</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="42" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="datamask--rows-depend-on-the-data"><code>data(mask, :)</code> Rows Depend on the Data</h2>
<p>The number of rows equals the number of <code>true</code> entries in <code>mask</code> — determined by your data, not by its original size.</p>
<pre><code class="language-matlab">sum(mask)        <span class="hljs-comment">% count of true entries → number of rows in result</span>
result = data(mask, :);
<span class="hljs-built_in">size</span>(result)     <span class="hljs-comment">% [sum(mask), 4]</span>
</code></pre>
<ul>
<li>If no rows satisfy the condition: result is <strong>0×4</strong> (empty, not an error)</li>
<li>If all rows satisfy: result is <strong>500×4</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="43" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="compound-conditions-time-windows">Compound Conditions: Time Windows</h2>
<p>Build the condition step by step:</p>
<pre><code class="language-matlab">test1  = data(:, <span class="hljs-number">4</span>) &gt;= <span class="hljs-number">2.0</span>;          <span class="hljs-comment">% 500×1 logical</span>
test2  = data(:, <span class="hljs-number">4</span>) &lt;= <span class="hljs-number">4.0</span>;          <span class="hljs-comment">% 500×1 logical</span>
window = data(test1 &amp; test2, :);     <span class="hljs-comment">% rows where both are true</span>
</code></pre>
<ul>
<li><code>&amp;</code> is element-wise AND — works on arrays</li>
<li>Both conditions must be true for a row to be included</li>
</ul>
<p>More commonly, programmers write this in one line:</p>
<pre><code class="language-matlab">window = data(data(:, <span class="hljs-number">4</span>) &gt;= <span class="hljs-number">2.0</span> &amp; data(:, <span class="hljs-number">4</span>) &lt;= <span class="hljs-number">4.0</span>, :);
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="44" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="the-event-extraction-pipeline">The Event-Extraction Pipeline</h2>
<pre><code class="language-matlab">threshold = <span class="hljs-number">12.0</span>;
mask     = data(:, <span class="hljs-number">1</span>) &gt; threshold;   <span class="hljs-comment">% which rows fire?</span>
<span class="hljs-keyword">events</span>   = data(mask, :);             <span class="hljs-comment">% all columns for those rows</span>
t_events = <span class="hljs-keyword">events</span>(:, <span class="hljs-number">4</span>);             <span class="hljs-comment">% just the timestamps</span>
</code></pre>
<ul>
<li>Three lines: define condition → extract rows → extract sub-column</li>
<li>This pattern is used in MP3 (<code>detectRapidAcceleration</code>) and beyond</li>
<li>You are writing this pipeline today in class, in MP2 in lab, and as a function in MP3</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-class="activity" data-theme="eng6" lang="en-US" class="activity" data-marpit-pagination="45" style="--paginate:true;--class:activity;--theme:eng6;" data-marpit-pagination-total="59">
<h1 id="activity-2-right-or-wrong">Activity 2: Right or Wrong?</h1>

<p>For each: read the <strong>intent</strong>, look at the code.</p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="46" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="problem-1">Problem 1</h2>
<p><strong>Intent:</strong> Get all rows of <code>data</code> where the X-axis signal (column 1) exceeds 2</p>
<pre><code class="language-matlab">data(data(:, <span class="hljs-number">1</span>) &gt; <span class="hljs-number">2</span>)
</code></pre>
<p>Right or wrong?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="47" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="problem-1-whats-wrong-and-how-to-fix-it">Problem 1: What's Wrong and How to Fix It</h2>
<p><strong>Wrong.</strong> The missing <code>, :</code> triggers <strong>linear indexing</strong> — MATLAB extracts individual <em>elements</em>, not rows.</p>
<p><strong>Fix:</strong></p>
<pre><code class="language-matlab">data(data(:, <span class="hljs-number">1</span>) &gt; <span class="hljs-number">2</span>, :)
</code></pre>
<p>The <code>, :</code> tells MATLAB: &quot;for the qualifying rows, keep <strong>all columns</strong>.&quot;</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="48" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="problem-2">Problem 2</h2>
<p><strong>Intent:</strong> Get rows of <code>data</code> where <code>Ax</code> exceeds 2 — <code>Ax</code> was extracted as <code>data(1, :)</code></p>
<pre><code class="language-matlab">Ax = data(<span class="hljs-number">1</span>, :);       <span class="hljs-comment">% first row, all columns → 1×4</span>
data(Ax &gt; <span class="hljs-number">2</span>, :)
</code></pre>
<p>Right or wrong?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="49" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="problem-2-whats-wrong-and-how-to-fix-it">Problem 2: What's Wrong and How to Fix It</h2>
<p><strong>Wrong.</strong> <code>data(1, :)</code> extracts the <strong>first row</strong> — a 1×4 vector. <code>Ax &gt; 2</code> then produces a 1×4 logical — not a column vector, so it cannot select rows.</p>
<p><strong>Fix:</strong> Extract a column, not a row:</p>
<pre><code class="language-matlab">Ax = data(:, <span class="hljs-number">1</span>);       <span class="hljs-comment">% all rows, column 1 → 500×1</span>
data(Ax &gt; <span class="hljs-number">2</span>, :)        <span class="hljs-comment">% now Ax &gt; 2 is 500×1 — correct row selector</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="50" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="problem-3">Problem 3</h2>
<p><strong>Intent:</strong> Extract data between t = 2.0 and t = 4.0</p>
<pre><code class="language-matlab">data(<span class="hljs-number">2.0</span> &lt;= data(:, <span class="hljs-number">4</span>) &lt;= <span class="hljs-number">4.0</span>, :)
</code></pre>
<p>Right or wrong?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="51" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="problem-3-whats-wrong-and-how-to-fix-it">Problem 3: What's Wrong and How to Fix It</h2>
<p><strong>Wrong.</strong> Chained comparisons do not work in MATLAB (unlike Python or math notation). MATLAB evaluates left to right:</p>
<p><code>2.0 &lt;= data(:,4)</code> → logical column (0s and 1s)</p>
<p>then <code>[0 or 1] &lt;= 4.0</code> → <strong>always true</strong> — every row is selected.</p>
<p><strong>Fix:</strong> Two separate conditions joined with <code>&amp;</code>:</p>
<pre><code class="language-matlab">data(data(:, <span class="hljs-number">4</span>) &gt;= <span class="hljs-number">2.0</span> &amp; data(:, <span class="hljs-number">4</span>) &lt;= <span class="hljs-number">4.0</span>, :)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="52" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="59">
<h1 id="custom-functions">Custom Functions</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="53" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="from-script-to-function">From Script to Function</h2>
<p>You have written <strong>scripts</strong> — a sequence of commands that runs top to bottom.<br />
You have called <strong>built-in functions</strong> — <code>sqrt</code>, <code>size</code>, <code>mean</code>, <code>plot</code>.</p>
<p>A <strong>custom function</strong> is a script you give a name, inputs, and outputs:</p>
<pre><code class="language-matlab"><span class="hljs-function"><span class="hljs-keyword">function</span> <span class="hljs-title">R</span> = <span class="hljs-title">resultant</span><span class="hljs-params">(Ax, Ay, Az)</span></span>
    R = <span class="hljs-built_in">sqrt</span>(Ax.^<span class="hljs-number">2</span> + Ay.^<span class="hljs-number">2</span> + Az.^<span class="hljs-number">2</span>);
<span class="hljs-keyword">end</span>
</code></pre>
<ul>
<li><code>function</code> keyword opens the definition; <code>end</code> closes it</li>
<li><code>R</code> is the <strong>output</strong> — what the function returns</li>
<li><code>Ax, Ay, Az</code> are the <strong>inputs</strong> — what the caller passes in</li>
<li>The body is ordinary MATLAB — the same lines you would write in a script</li>
</ul>
<p>Call it exactly like a built-in:</p>
<pre><code class="language-matlab">R = resultant(Ax, Ay, Az);
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="54" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="the-rules">The Rules</h2>
<pre><code class="language-matlab"><span class="hljs-function"><span class="hljs-keyword">function</span> <span class="hljs-params">[out1, out2]</span> = <span class="hljs-title">myFunction</span><span class="hljs-params">(in1, in2)</span></span>
    <span class="hljs-comment">% body</span>
<span class="hljs-keyword">end</span>
</code></pre>
<table>
<thead>
<tr>
<th>Rule</th>
<th>Detail</th>
</tr>
</thead>
<tbody>
<tr>
<td>File name = function name</td>
<td><code>myFunction</code> must live in <code>myFunction.m</code> — case-sensitive</td>
</tr>
<tr>
<td>Square brackets for multiple outputs</td>
<td><code>[out1, out2]</code> — omit brackets if only one output</td>
</tr>
<tr>
<td>Caller provides inputs in order</td>
<td><code>myFunction(a, b)</code> → <code>in1 = a</code>, <code>in2 = b</code> inside</td>
</tr>
<tr>
<td>Variables are local</td>
<td><code>in1</code>, <code>out1</code> exist only inside the function — not in the workspace</td>
</tr>
</tbody>
</table>
<p><strong>In L5:</strong> <code>detectRapidAcceleration(sensorData, threshold)</code> — two inputs, three outputs. Same rules.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="55" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="59">
<h1 id="wrap-up-and-lab-connection">Wrap-Up and Lab Connection</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="56" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="the-four-line-pattern">The Four-Line Pattern</h2>
<pre><code class="language-matlab">Ax = data(:, <span class="hljs-number">1</span>);   <span class="hljs-comment">% X-axis acceleration  [m/s^2]</span>
Ay = data(:, <span class="hljs-number">2</span>);   <span class="hljs-comment">% Y-axis acceleration  [m/s^2]</span>
Az = data(:, <span class="hljs-number">3</span>);   <span class="hljs-comment">% Z-axis acceleration  [m/s^2]</span>
t  = data(:, <span class="hljs-number">4</span>);   <span class="hljs-comment">% timestamps           [s]</span>
</code></pre>
<ul>
<li>Referenced in every subsequent project</li>
<li>Know it by heart before your MP2 lab</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="57" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
<h2 id="the-mp2-pipeline-in-full">The MP2 Pipeline in Full</h2>
<pre><code>data  (500×4)
  ↓   data(:, 1..4)
Ax, Ay, Az, t   (1D column vectors)
  ↓   sqrt(Ax.^2 + Ay.^2 + Az.^2)
R   (resultant acceleration)
  ↓   [val, idx] = max(R)
Peak location
  ↓   plot(t, R) + xline
Annotated figure
</code></pre>
<ul>
<li>Every step uses a skill from L1–L4</li>
<li>L5 adds: <code>find</code>, <code>sort</code>, <code>any</code>/<code>all</code> — and wraps this pipeline in a function</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="58" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="59">
