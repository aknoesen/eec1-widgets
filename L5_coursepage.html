<h2 id="learning-objectives">Learning Objectives</h2>
<p><strong>By the end of today you will be able to:</strong></p>
<ul>
<li>Distinguish <code>size</code>, <code>numel</code>, <code>length</code> — and know when each lies to you</li>
<li>Use <code>find</code> to return indices of threshold-crossing events</li>
<li>Write a function that accepts a 2D sensor matrix and extracts what it needs internally</li>
<li>Compute a summary statistic (<code>mean</code>) with a safe empty-array guard</li>
<li>Apply <code>any</code> and <code>all</code> to test conditions across an entire array in one line</li>
<li>Sort detected events while keeping aligned arrays in step</li>
</ul>
<p> </p>
<blockquote>
<p>&quot;Raise your hand if... (a) you extracted columns from a matrix in L4, (b) you got a different answer than expected at least once.&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="4" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="46">
<h1 id="dimensional-inspection">Dimensional Inspection</h1>
<h2 id="size--numel--length"><code>size</code> · <code>numel</code> · <code>length</code></h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="three-functions-three-answers">Three Functions, Three Answers</h2>
<p>Given: <code>data = [1 2 3; 4 5 6]</code> — a 2-by-3 matrix</p>
<pre><code class="language-matlab"><span class="hljs-built_in">size</span>(data)       <span class="hljs-comment">% returns [2, 3]</span>
<span class="hljs-built_in">numel</span>(data)      <span class="hljs-comment">% returns 6</span>
<span class="hljs-built_in">length</span>(data)     <span class="hljs-comment">% returns 3  (maximum dimension)</span>
</code></pre>
<p><strong>What does each return on a column vector <code>v = [1;2;3;4;5]</code>?</strong></p>
<pre><code class="language-matlab"><span class="hljs-built_in">size</span>(v)          <span class="hljs-comment">% ?</span>
<span class="hljs-built_in">numel</span>(v)         <span class="hljs-comment">% ?</span>
<span class="hljs-built_in">length</span>(v)        <span class="hljs-comment">% ?</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="the-length-trap">The <code>length</code> Trap</h2>
<p><code>length(x)</code> returns the <strong>maximum</strong> of the dimensions — not always what you expect.</p>
<table>
<thead>
<tr>
<th>Array</th>
<th><code>size</code></th>
<th><code>numel</code></th>
<th><code>length</code></th>
</tr>
</thead>
<tbody>
<tr>
<td><code>[1 2 3]</code> (row)</td>
<td>[1, 3]</td>
<td>3</td>
<td><strong>3</strong></td>
</tr>
<tr>
<td><code>[1;2;3]</code> (col)</td>
<td>[3, 1]</td>
<td>3</td>
<td><strong>3</strong></td>
</tr>
<tr>
<td><code>[1 2; 3 4; 5 6]</code> (matrix)</td>
<td>[3, 2]</td>
<td>6</td>
<td><strong>3</strong> ← max dim</td>
</tr>
</tbody>
</table>
<p><strong>Rule for sensor data (column vectors):</strong> Use <code>size(x, 1)</code> for number of rows — never <code>length</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="raise-your-hand-3">Raise Your Hand</h2>
<p><code>R = [3.2; 15.6; 8.1; 22.3; 4.5]</code> — a column vector with 5 rows</p>
<blockquote>
<p>&quot;What does <code>length(R)</code> return?&quot;</p>
</blockquote>
<p><strong>(a)</strong> 1     <strong>(b)</strong> 5     <strong>(c)</strong> it depends on the data — <em>hands up</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="lengthr-returns-5--and-why-that-is-dangerous"><code>length(R)</code> Returns 5 — and Why That Is Dangerous</h2>
<p><code>R</code> has 5 rows, 1 column. Maximum dimension = 5. So <code>length(R)</code> → <strong>5</strong> — looks right.</p>
<p>Now accidentally load 2 sensors side by side: <code>R</code> becomes 2×5. <code>length(R)</code> still returns <strong>5</strong> — but now it is the column count, not the row count. Wrong answer. No error.</p>
<p><strong><code>size(R, 1)</code> always returns the row count. Use it.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="12" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="46">
<h1 id="the-find-function">The <code>find</code> Function</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="13" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="two-ways-to-locate-events">Two Ways to Locate Events</h2>
<pre><code class="language-matlab">R = [<span class="hljs-number">3.2</span>, <span class="hljs-number">15.6</span>, <span class="hljs-number">8.1</span>, <span class="hljs-number">22.3</span>, <span class="hljs-number">4.5</span>, <span class="hljs-number">19.8</span>, <span class="hljs-number">6.1</span>];
threshold = <span class="hljs-number">14</span>;
</code></pre>
<p><strong>Method A — Logical mask (you already know this):</strong></p>
<pre><code class="language-matlab">ss = R &gt; threshold           <span class="hljs-comment">% logical array: [0 1 0 1 0 1 0]</span>
R(ss)                        <span class="hljs-comment">% values: [15.6, 22.3, 19.8]</span>
</code></pre>
<p><strong>Method B — <code>find</code>:</strong></p>
<pre><code class="language-matlab">idx = <span class="hljs-built_in">find</span>(R &gt; threshold)    <span class="hljs-comment">% integer indices: [2, 4, 6]</span>
R(idx)                       <span class="hljs-comment">% same values: [15.6, 22.3, 19.8]</span>
</code></pre>
<p><strong>Both extract the same values. A logical mask indexes into aligned arrays just as well as <code>find</code> does.</strong> <code>find</code> is most useful when you specifically need the integer positions — for display, debugging, or index arithmetic.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="another-way-to-find-indices">Another Way to Find Indices</h2>
<p>The same indices can be built from a logical mask and an index vector:</p>
<pre><code class="language-matlab">R = [<span class="hljs-number">3.2</span>, <span class="hljs-number">15.6</span>, <span class="hljs-number">8.1</span>, <span class="hljs-number">22.3</span>, <span class="hljs-number">4.5</span>, <span class="hljs-number">19.8</span>, <span class="hljs-number">6.1</span>];
threshold = <span class="hljs-number">14</span>;
mask    = R &gt; threshold;   <span class="hljs-comment">% logical mask:  [0 1 0 1 0 1 0]</span>
idx     = <span class="hljs-number">1</span>:<span class="hljs-built_in">numel</span>(R);      <span class="hljs-comment">% index vector:  [1 2 3 4 5 6 7]</span>
indices = idx(mask);       <span class="hljs-comment">% select indices where mask is true: [2 4 6]</span>
</code></pre>
<p><code>find(R &gt; threshold)</code> is a shortcut for exactly this pattern — same result, one line.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="indexing-into-aligned-arrays">Indexing Into Aligned Arrays</h2>
<p>A logical mask or <code>find</code> indices both let you extract from any aligned array:</p>
<pre><code class="language-matlab">R = [<span class="hljs-number">3.2</span>, <span class="hljs-number">15.6</span>, <span class="hljs-number">8.1</span>, <span class="hljs-number">22.3</span>, <span class="hljs-number">4.5</span>, <span class="hljs-number">19.8</span>, <span class="hljs-number">6.1</span>];
t = [<span class="hljs-number">0.0</span>, <span class="hljs-number">0.1</span>,  <span class="hljs-number">0.2</span>, <span class="hljs-number">0.3</span>,  <span class="hljs-number">0.4</span>, <span class="hljs-number">0.5</span>,  <span class="hljs-number">0.6</span>];

<span class="hljs-comment">% Convert raw timestamps to elapsed time first:</span>
t_elapsed = t - t(<span class="hljs-number">1</span>);        <span class="hljs-comment">% [0.0, 0.1, 0.2, ...]</span>

<span class="hljs-comment">% Using a logical mask — clean and direct:</span>
ss       = R &gt; threshold;
events_t = t_elapsed(ss);    <span class="hljs-comment">% times:      [0.1, 0.3, 0.5]</span>
events_R = R(ss);            <span class="hljs-comment">% magnitudes: [15.6, 22.3, 19.8]</span>

<span class="hljs-comment">% Using find — identical result:</span>
idx      = <span class="hljs-built_in">find</span>(R &gt; threshold);
events_t = t_elapsed(idx);
events_R = R(idx);
</code></pre>
<p><strong>This is the core logic of <code>detectRapidAcceleration</code> in MP3.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="raise-your-hand-7">Raise Your Hand</h2>
<pre><code class="language-matlab">R = [<span class="hljs-number">3.2</span>, <span class="hljs-number">15.6</span>, <span class="hljs-number">8.1</span>, <span class="hljs-number">22.3</span>, <span class="hljs-number">4.5</span>, <span class="hljs-number">19.8</span>, <span class="hljs-number">6.1</span>];   threshold = <span class="hljs-number">14</span>;
idx = <span class="hljs-built_in">find</span>(R &gt; threshold)
</code></pre>
<blockquote>
<p>&quot;What does <code>find</code> return?&quot;</p>
</blockquote>
<p><strong>(a)</strong> the values — <code>[15.6, 22.3, 19.8]</code>     <strong>(b)</strong> the indices — <code>[2, 4, 6]</code>     <strong>(c)</strong> the logical mask — <code>[0, 1, 0, 1, 0, 1, 0]</code> — <em>hands up</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="find-returns-indices-not-values"><code>find</code> Returns Indices, Not Values</h2>
<pre><code class="language-matlab">idx  = <span class="hljs-built_in">find</span>(R &gt; threshold)   <span class="hljs-comment">% [2, 4, 6]       — class double</span>
mask = R &gt; threshold         <span class="hljs-comment">% [0 1 0 1 0 1 0] — class logical</span>
</code></pre>
<p><code>find</code> always returns integer <strong>positions</strong>. <code>mask</code> is a logical array. Different types — not interchangeable in all contexts.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="what-find-returns-for-no-match">What <code>find</code> Returns for No Match</h2>
<pre><code class="language-matlab">R = [<span class="hljs-number">3.2</span>, <span class="hljs-number">8.1</span>, <span class="hljs-number">4.5</span>];
threshold = <span class="hljs-number">20</span>;

idx      = <span class="hljs-built_in">find</span>(R &gt; threshold)   <span class="hljs-comment">% []  — empty 1×0 array</span>
<span class="hljs-built_in">isempty</span>(idx)                     <span class="hljs-comment">% 1</span>
</code></pre>
<p><code>isempty(x)</code> returns <code>1</code> when <code>x</code> has zero elements — the same function from the Functions section.</p>
<p>In L6 you write the guard that acts on this: <code>if isempty(idx)</code> → handle the empty case. For now — know it can happen and know <code>isempty</code> detects it.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="22" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="46">
<h1 id="functions-with-2d-array-inputs">Functions with 2D Array Inputs</h1>
<h2 id="zybooks-810">ZyBooks 8.10</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="accepting-a-2d-matrix-as-a-function-input">Accepting a 2D Matrix as a Function Input</h2>
<p>MP3 passes the entire sensor matrix into the detection function:</p>
<pre><code class="language-matlab"><span class="hljs-function"><span class="hljs-keyword">function</span> <span class="hljs-params">[ts, A, avgA]</span> = <span class="hljs-title">detectRapidAcceleration</span><span class="hljs-params">(sensorData, threshold)</span></span>
</code></pre>
<p><code>sensorData</code> is an N×4 matrix. Extract what you need <strong>inside</strong> the function:</p>
<pre><code class="language-matlab">    Ax         = sensorData(:, <span class="hljs-number">1</span>);   <span class="hljs-comment">% X acceleration</span>
    Ay         = sensorData(:, <span class="hljs-number">2</span>);   <span class="hljs-comment">% Y acceleration</span>
    Az         = sensorData(:, <span class="hljs-number">3</span>);   <span class="hljs-comment">% Z acceleration</span>
    timestamps = sensorData(:, <span class="hljs-number">4</span>);   <span class="hljs-comment">% timestamps</span>

    t_elapsed   = timestamps - timestamps(<span class="hljs-number">1</span>);

    <span class="hljs-comment">% Element-wise ops on column vectors — identical to scalars (ZyBooks 8.8):</span>
    A_resultant = <span class="hljs-built_in">sqrt</span>(Ax.^<span class="hljs-number">2</span> + Ay.^<span class="hljs-number">2</span> + Az.^<span class="hljs-number">2</span>);
</code></pre>
<p><strong>Why pass the whole matrix?</strong> The caller doesn't need to know the internal column structure — the function encapsulates it.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="isempty-and-the-is-function-family"><code>isempty</code> and the <code>is...</code> Function Family</h2>
<pre><code class="language-matlab">ss = A_resultant &gt; threshold;
A  = A_resultant(ss);

<span class="hljs-built_in">isempty</span>(A)        <span class="hljs-comment">% true if A has no elements — try it when threshold = 100</span>
<span class="hljs-built_in">mean</span>(A)           <span class="hljs-comment">% mean of detected magnitudes — but mean([]) returns NaN !</span>
</code></pre>
<p><strong><code>isempty(x)</code></strong> — returns <code>true</code> (1) when <code>x</code> has zero elements. The safe check before operating on a result that might be empty.</p>
<p>MATLAB has a whole family of <code>is...</code> functions — explore them:</p>
<pre><code class="language-matlab"><span class="hljs-built_in">isnan</span>(x)       <span class="hljs-built_in">isinf</span>(x)       isnumeric(x)
ischar(x)      islogical(x)   <span class="hljs-built_in">isvector</span>(x)     <span class="hljs-built_in">isscalar</span>(x)
</code></pre>
<p><strong>In L6 (Branches) you will write the guard that makes <code>avgA = 0.0</code> when no events are found.</strong> For now: know that <code>mean([])</code> returns <code>NaN</code>, and <code>isempty</code> is how you detect the problem.</p>
<p>To annotate <code>avgA</code> on a plot: <code>text(x, y, sprintf('avg = %.2f', avgA))</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-class="activity" data-theme="eng6" lang="en-US" class="activity" data-marpit-pagination="25" style="--paginate:true;--class:activity;--theme:eng6;" data-marpit-pagination-total="46">
<h1 id="activity-1">Activity 1</h1>
<h2 id="build-the-detection-core">Build the Detection Core</h2>
<p><strong>Teams of 3–4 | 20 min working + 5 min debrief</strong></p>
<p><strong>Goal:</strong> Write the body of <code>detectRapidAcceleration(sensorData, threshold)</code> using the tools from today — column extraction, resultant, logical mask, <code>isempty</code>. This is the MP3 lab function.</p>
<p><strong>What you know from today and from ZyBooks 8.10:</strong></p>
<ul>
<li>Extract columns: <code>sensorData(:, k)</code></li>
<li>Compute resultant: <code>sqrt(Ax.^2 + Ay.^2 + Az.^2)</code></li>
<li>Locate events: logical mask or <code>find</code> — your choice</li>
<li>Guard against empty result: <code>isempty</code></li>
</ul>
<pre><code class="language-matlab">sensorData = [<span class="hljs-number">3.0</span>  <span class="hljs-number">0.8</span>  <span class="hljs-number">0.8</span>  <span class="hljs-number">0.0</span>;
             <span class="hljs-number">15.0</span>  <span class="hljs-number">2.3</span>  <span class="hljs-number">1.4</span>  <span class="hljs-number">0.1</span>;
              <span class="hljs-number">8.0</span>  <span class="hljs-number">1.0</span>  <span class="hljs-number">0.5</span>  <span class="hljs-number">0.2</span>;
             <span class="hljs-number">22.0</span>  <span class="hljs-number">2.8</span>  <span class="hljs-number">1.8</span>  <span class="hljs-number">0.3</span>;
              <span class="hljs-number">4.0</span>  <span class="hljs-number">0.7</span>  <span class="hljs-number">0.5</span>  <span class="hljs-number">0.4</span>;
             <span class="hljs-number">19.0</span>  <span class="hljs-number">2.5</span>  <span class="hljs-number">1.6</span>  <span class="hljs-number">0.5</span>;
              <span class="hljs-number">6.0</span>  <span class="hljs-number">0.9</span>  <span class="hljs-number">0.6</span>  <span class="hljs-number">0.6</span>];
threshold = <span class="hljs-number">14</span>;
</code></pre>
<p><strong>Open your handout. On your own first — predict before running. Then compare with your team.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="activity-1--debrief">Activity 1 — Debrief</h2>
<blockquote>
<p>&quot;Raise your hand if your team got exactly the right answer on the first try.&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="activity-1--discussion">Activity 1 — Discussion</h2>
<p><strong>Discussion anchors:</strong></p>
<ul>
<li>What do <code>ts</code> and <code>A</code> contain when no events are found?</li>
<li>What does <code>mean([])</code> return — and why does that matter for the <code>avgA</code> output you'll complete in L6?</li>
<li>How does passing <code>sensorData</code> as one matrix change the function compared to passing <code>t</code> and <code>R</code> separately?</li>
</ul>
<p><strong>Teaching point:</strong> Encapsulating column extraction inside the function means the caller never has to know about column indices. That is the professional pattern — and it is exactly what MP3 requires.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="28" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="46">
<h1 id="sort-with-index-output">Sort with Index Output</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="sort-with-two-outputs"><code>sort</code> with Two Outputs</h2>
<p>You have detected events. You want to rank them by magnitude — but must keep timestamps aligned.</p>
<pre><code class="language-matlab">events_R = [<span class="hljs-number">15.6</span>, <span class="hljs-number">22.3</span>, <span class="hljs-number">19.8</span>];
events_t = [<span class="hljs-number">0.1</span>,  <span class="hljs-number">0.3</span>,  <span class="hljs-number">0.5</span>];

[sorted_R, sort_idx] = <span class="hljs-built_in">sort</span>(events_R, <span class="hljs-string">&#x27;descend&#x27;</span>);
<span class="hljs-comment">% sorted_R = [22.3, 19.8, 15.6]</span>
<span class="hljs-comment">% sort_idx = [2,    3,    1   ]</span>

sorted_t = events_t(sort_idx);
<span class="hljs-comment">% sorted_t = [0.3, 0.5, 0.1]</span>
</code></pre>
<p><strong>Rule:</strong> Any time you sort one array, reorder all aligned arrays with the same index.</p>
<p><em>The second output of <code>sort</code> is the same concept as the second output of <code>max</code> from L3.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="raise-your-hand-11">Raise Your Hand</h2>
<pre><code class="language-matlab">x = [<span class="hljs-number">10</span>, <span class="hljs-number">30</span>, <span class="hljs-number">20</span>];
[sorted_x, sort_idx] = <span class="hljs-built_in">sort</span>(x);   <span class="hljs-comment">% ascending by default</span>
</code></pre>
<blockquote>
<p>&quot;What is <code>sort_idx</code>?&quot;</p>
</blockquote>
<p><strong>(a)</strong> <code>[1, 2, 3]</code>     <strong>(b)</strong> <code>[1, 3, 2]</code>     <strong>(c)</strong> <code>[3, 1, 2]</code> — <em>hands up</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="sort_idx-is-1-3-2"><code>sort_idx</code> is <code>[1, 3, 2]</code></h2>
<pre><code class="language-matlab">x        = [<span class="hljs-number">10</span>,  <span class="hljs-number">30</span>,  <span class="hljs-number">20</span>];
sorted_x = [<span class="hljs-number">10</span>,  <span class="hljs-number">20</span>,  <span class="hljs-number">30</span>];   <span class="hljs-comment">% ascending</span>
sort_idx = [ <span class="hljs-number">1</span>,   <span class="hljs-number">3</span>,   <span class="hljs-number">2</span>];   <span class="hljs-comment">% original positions</span>
</code></pre>
<ul>
<li>Sorted position 1 holds value <code>10</code> — it came from <code>x(1)</code> → <code>sort_idx(1) = 1</code></li>
<li>Sorted position 2 holds value <code>20</code> — it came from <code>x(3)</code> → <code>sort_idx(2) = 3</code></li>
<li>Sorted position 3 holds value <code>30</code> — it came from <code>x(2)</code> → <code>sort_idx(3) = 2</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="35" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="46">
<h1 id="logical-functions">Logical Functions</h1>
<h2 id="any-and-all"><code>any</code> and <code>all</code></h2>
<p><code>R = [3.2, 15.6, 8.1, 22.3, 4.5]</code></p>
<blockquote>
<p>&quot;These two functions confuse almost everyone the first time. Before I show you the output — what do you think <code>any(R &gt; 14)</code> returns?&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="36" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="reducing-a-logical-array-to-one-answer">Reducing a Logical Array to One Answer</h2>
<p>You already know:</p>
<pre><code class="language-matlab">mask = R &gt; <span class="hljs-number">14</span>    <span class="hljs-comment">% returns [0 1 0 1 0 1 0] — logical array</span>
</code></pre>
<p>Sometimes you just want one yes/no answer across the whole array:</p>
<pre><code class="language-matlab">any(R &gt; <span class="hljs-number">14</span>)
all(R &gt; <span class="hljs-number">14</span>)
</code></pre>
<div style="font-size:0.9em; margin-top:0.2em;">
<span style="color:#cc0000; font-weight:bold;">any(R &gt; 14) → 1 (true) &nbsp;— at least one element qualifies</span><br />
<span style="color:#cc0000; font-weight:bold;">all(R &gt; 14) → 0 (false) — not every element qualifies</span>
</div>
<p><strong><code>any</code> and <code>all</code> are logical functions</strong> — they collapse an entire array to a single <code>true</code> or <code>false</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="37" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="any-and-all-return-a-logical-value"><code>any</code> and <code>all</code> Return a Logical Value</h2>
<pre><code class="language-matlab">R = [<span class="hljs-number">3.2</span>, <span class="hljs-number">15.6</span>, <span class="hljs-number">8.1</span>, <span class="hljs-number">22.3</span>, <span class="hljs-number">4.5</span>];

any(R &gt; <span class="hljs-number">14</span>)     <span class="hljs-comment">% 1  — at least one element exceeds 14</span>
all(R &gt; <span class="hljs-number">14</span>)     <span class="hljs-comment">% 0  — not every element exceeds 14</span>
any(R &gt; <span class="hljs-number">30</span>)     <span class="hljs-comment">% 0  — none exceed 30</span>
all(R &gt; <span class="hljs-number">0</span>)      <span class="hljs-comment">% 1  — every element is positive</span>
</code></pre>
<p><strong>The common confusion:</strong> students expect <code>any(R &gt; 14)</code> to return the qualifying elements.<br />
It returns <strong>one scalar</strong> — <code>1</code> or <code>0</code>. Nothing else.</p>
<pre><code class="language-matlab">R(R &gt; <span class="hljs-number">14</span>)         <span class="hljs-comment">% [15.6, 22.3]  ← values   (logical indexing)</span>
<span class="hljs-built_in">find</span>(R &gt; <span class="hljs-number">14</span>)      <span class="hljs-comment">% [2, 4]        ← positions (find)</span>
any(R &gt; <span class="hljs-number">14</span>)       <span class="hljs-comment">% 1             ← yes/no    (any)</span>
</code></pre>
<p>In L6 (Branches), <code>any</code> and <code>all</code> become conditions inside <code>if</code> statements.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="38" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="any-and-all-on-2d-arrays"><code>any</code> and <code>all</code> on 2D Arrays</h2>
<p>Default is <strong>column-wise</strong> — one result per column:</p>
<pre><code class="language-matlab">A = [<span class="hljs-number">1</span> <span class="hljs-number">5</span> <span class="hljs-number">2</span>; <span class="hljs-number">6</span> <span class="hljs-number">3</span> <span class="hljs-number">7</span>];          <span class="hljs-comment">% 2-by-3</span>

any(A &gt; <span class="hljs-number">4</span>)            <span class="hljs-comment">% 1-by-3 → [1 1 1]    (any element in each column &gt; 4)</span>
any(A &gt; <span class="hljs-number">4</span>, <span class="hljs-number">2</span>)         <span class="hljs-comment">% 2-by-1 → [1; 1]     (any element in each row &gt; 4)</span>
any(A &gt; <span class="hljs-number">4</span>, <span class="hljs-number">2</span>).&#x27;       <span class="hljs-comment">% 1-by-2 → [1 1]      (row-vector form)</span>
</code></pre>
<p><strong>Transpose</strong> <code>.′</code> — the smallest symbol that does the most:</p>
<pre><code class="language-matlab">v = [<span class="hljs-number">1</span>; <span class="hljs-number">1</span>];   <span class="hljs-comment">% 2×1 column vector</span>
v.&#x27;           <span class="hljs-comment">% [1 1]  — 1×2 row vector</span>
</code></pre>
<p><code>[dimension-2 result]</code> is a column → transpose it when you need a row.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="39" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="46">
<h2 id="any--all-vs-find-vs-logical-indexing"><code>any</code> / <code>all</code> vs. <code>find</code> vs. Logical Indexing</h2>
<table>
<thead>
<tr>
<th>You want</th>
<th>Use</th>
</tr>
</thead>
<tbody>
<tr>
<td>Does any event exist?</td>
<td><code>any(R &gt; threshold)</code></td>
</tr>
<tr>
<td>Do all samples meet a condition?</td>
<td><code>all(R &lt; limit)</code></td>
</tr>
<tr>
<td>Where are the events (indices)?</td>
<td><code>find(R &gt; threshold)</code></td>
</tr>
<tr>
<td>What are the event values?</td>
<td><code>R(R &gt; threshold)</code></td>
</tr>
</tbody>
</table>
<p><strong>Pick the right tool for the question.</strong></p>
</section>

<p><strong>Goal:</strong> Use the detection logic from Activity 1 with three different thresholds. Use <code>any</code> and <code>all</code> to answer existence questions. Build the intuition behind the MP3 reflection question: why does no single threshold work for every scenario?</p>

<p>&quot;Raise your hand if your team thinks a single threshold works for walking, running, AND a car crash.&quot;</p>

<p><strong>Teaching point:</strong> This is not a bug in your code — it is a real engineering problem.</p>

<h2 id="todays-tools-%E2%86%92-mp3-function">Today's Tools → MP3 Function</h2>
<pre><code class="language-matlab"><span class="hljs-function"><span class="hljs-keyword">function</span> <span class="hljs-params">[ts, A, avgA]</span> = <span class="hljs-title">detectRapidAcceleration</span><span class="hljs-params">(sensorData, threshold)</span></span>
    Ax          = sensorData(:, <span class="hljs-number">1</span>);
    Ay          = sensorData(:, <span class="hljs-number">2</span>);
    Az          = sensorData(:, <span class="hljs-number">3</span>);
    timestamps  = sensorData(:, <span class="hljs-number">4</span>);
    t_elapsed   = timestamps - timestamps(<span class="hljs-number">1</span>);
    A_resultant = <span class="hljs-built_in">sqrt</span>(Ax.^<span class="hljs-number">2</span> + Ay.^<span class="hljs-number">2</span> + Az.^<span class="hljs-number">2</span>);
    ss = A_resultant &gt; threshold;   <span class="hljs-comment">% logical mask — or use find(), same result</span>
    ts = t_elapsed(ss);
    A  = A_resultant(ss);
    <span class="hljs-comment">% avgA guard: isempty(A) check + mean(A) — you write this in L6</span>
<span class="hljs-keyword">end</span>
</code></pre>
<p><strong>This is the detection core.</strong> In L6 (Branches) you add the <code>avgA</code> guard: <code>if isempty(A)</code> → <code>avgA = 0.0</code>, else <code>avgA = mean(A)</code>.</p>
