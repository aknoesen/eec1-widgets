<h1 id="logical-operators">Logical Operators</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="and-xor"><code>&amp;</code>, <code>|</code>, <code>~</code>, and <code>xor</code></h2>
<p>Logical operators work on scalars and arrays — the same operators you used in L4 for array masks.</p>
<div style="display:flex; gap:1.5rem; align-items:flex-start;">
<div style="flex:1; background:#f0f0f0; padding:0.6rem 0.8rem; border-left:4px solid #002855; font-size:0.82em;">
<table>
<thead>
<tr>
<th>Operator</th>
<th>Meaning</th>
<th>Works on</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>&amp;</code></td>
<td>AND — both true</td>
<td>scalars and arrays</td>
</tr>
<tr>
<td><code>|</code></td>
<td>OR — at least one true</td>
<td>scalars and arrays</td>
</tr>
<tr>
<td><code>~</code></td>
<td>NOT — negation</td>
<td>scalars and arrays</td>
</tr>
<tr>
<td><code>xor(a,b)</code></td>
<td>exactly one true</td>
<td></td>
</tr>
</tbody>
</table>
</div>
<div style="flex:2;">
<pre><code class="language-matlab"><span class="hljs-comment">% Array mask (L4 pattern):</span>
mask = A_resultant &gt; <span class="hljs-number">5</span> &amp; A_resultant &lt; <span class="hljs-number">20</span>;
</code></pre>
<pre><code class="language-matlab"><span class="hljs-comment">% Scalar condition in if:</span>
<span class="hljs-keyword">if</span> threshold &gt; <span class="hljs-number">0</span> &amp; threshold &lt; <span class="hljs-number">100</span>
    <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;threshold in range&quot;</span>);
<span class="hljs-keyword">end</span>
</code></pre>
<pre><code class="language-matlab">xor(<span class="hljs-built_in">true</span>, <span class="hljs-built_in">false</span>)   <span class="hljs-comment">% → true   exactly one holds</span>
xor(<span class="hljs-built_in">true</span>, <span class="hljs-built_in">true</span>)    <span class="hljs-comment">% → false  both true is not exclusive</span>
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="short-circuit-operators--and">Short-Circuit Operators: <code>&amp;&amp;</code> and <code>||</code></h2>
<p><code>&amp;</code> always evaluates both sides. <code>&amp;&amp;</code> stops the moment the result is determined.</p>
<div style="display:flex; gap:1.5rem; align-items:flex-start;">
<div style="flex:1; background:#f0f0f0; padding:0.6rem 0.8rem; border-left:4px solid #002855; font-size:0.82em;">
<table>
<thead>
<tr>
<th>Operator</th>
<th>Evaluates</th>
<th>Works on</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>&amp;</code></td>
<td>both sides always</td>
<td>scalars <strong>and arrays</strong></td>
</tr>
<tr>
<td><code>&amp;&amp;</code></td>
<td>stops at first <code>false</code></td>
<td><strong>scalars only</strong></td>
</tr>
<tr>
<td><code>|</code></td>
<td>both sides always</td>
<td>scalars and arrays</td>
</tr>
<tr>
<td><code>||</code></td>
<td>stops at first <code>true</code></td>
<td>scalars only</td>
</tr>
</tbody>
</table>
</div>
<div style="flex:2;">
<pre><code class="language-matlab"><span class="hljs-comment">% &amp;&amp; stops before evaluating A(1) when A is empty:</span>
<span class="hljs-keyword">if</span> ~<span class="hljs-built_in">isempty</span>(A) &amp;&amp; A(<span class="hljs-number">1</span>) &gt; threshold
    <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;first event exceeds threshold&quot;</span>);
<span class="hljs-keyword">end</span>
</code></pre>
<pre><code class="language-matlab"><span class="hljs-comment">% Array mask — must use &amp;, not &amp;&amp;:</span>
mask = data(:,<span class="hljs-number">4</span>) &gt;= <span class="hljs-number">2.0</span> &amp; data(:,<span class="hljs-number">4</span>) &lt;= <span class="hljs-number">4.0</span>
<span class="hljs-comment">% data(:,4) &gt;= 2.0 &amp;&amp; data(:,4) &lt;= 4.0   % ERROR</span>
</code></pre>
</div>
</div>
<p><strong>Rule:</strong> <code>&amp;&amp;</code>/<code>||</code> for scalar <code>if</code> conditions; <code>&amp;</code>/<code>|</code> for array masks and element-wise logic.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="arrays-as-if-conditions-truthiness-rules">Arrays as <code>if</code> Conditions: Truthiness Rules</h2>
<p>What happens when an array ends up as an <code>if</code> condition?</p>
<pre><code class="language-matlab">mask = [<span class="hljs-number">1</span>, <span class="hljs-number">0</span>, <span class="hljs-number">1</span>];
<span class="hljs-keyword">if</span> mask             <span class="hljs-comment">% what does MATLAB do?</span>
    <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;entered&quot;</span>);
<span class="hljs-keyword">end</span>
</code></pre>
<p><strong>MATLAB rule:</strong> an array condition is <code>true</code> only if <strong>every element is nonzero</strong> — equivalent to <code>all(mask ~= 0)</code>.</p>
<pre><code class="language-matlab"><span class="hljs-keyword">if</span> [<span class="hljs-number">1</span>, <span class="hljs-number">1</span>, <span class="hljs-number">1</span>]   <span class="hljs-comment">% → true   (all nonzero)</span>
<span class="hljs-keyword">if</span> [<span class="hljs-number">1</span>, <span class="hljs-number">0</span>, <span class="hljs-number">1</span>]   <span class="hljs-comment">% → false  (contains a zero)</span>
<span class="hljs-keyword">if</span> []          <span class="hljs-comment">% → false  (empty array is always false)</span>
</code></pre>
<ul>
<li>This is rarely what you intend — use <code>any</code>, <code>all</code>, or a scalar expression explicitly</li>
<li>AI-generated code often passes arrays directly to <code>if</code> — silent logic error, not a runtime error</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="any-and-all-as-branch-conditions"><code>any</code> and <code>all</code> as Branch Conditions</h2>
<p>From L5: <code>any</code> and <code>all</code> collapse an array to a single logical value — safe as an <code>if</code> condition.</p>
<pre><code class="language-matlab"><span class="hljs-keyword">if</span> any(A_resultant &gt; threshold)
    <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;At least one event detected.&quot;</span>);
<span class="hljs-keyword">end</span>

<span class="hljs-keyword">if</span> all(R &lt; threshold)
    <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;Signal stays below threshold throughout.&quot;</span>);
<span class="hljs-keyword">end</span>
</code></pre>
<ul>
<li><code>any(R &gt; threshold)</code> → one <code>true</code>/<code>false</code> — a scalar, safe in <code>if</code></li>
<li>Compare: <code>if R &gt; threshold</code> — <strong>array condition</strong> — almost always wrong (see previous slide)</li>
<li><code>any</code>/<code>all</code> are the bridge from array logic to scalar branch decisions</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="compound-conditions-in-practice">Compound Conditions in Practice</h2>
<pre><code class="language-matlab"><span class="hljs-comment">% Check: sensorData has rows AND has 4 columns AND threshold is positive</span>
<span class="hljs-keyword">if</span> <span class="hljs-built_in">size</span>(sensorData, <span class="hljs-number">1</span>) &gt; <span class="hljs-number">0</span> &amp;&amp; <span class="hljs-built_in">size</span>(sensorData, <span class="hljs-number">2</span>) == <span class="hljs-number">4</span> &amp;&amp; threshold &gt; <span class="hljs-number">0</span>
    <span class="hljs-comment">% safe to proceed</span>
<span class="hljs-keyword">end</span>
</code></pre>
<ul>
<li>Chain scalar conditions with <code>&amp;&amp;</code></li>
<li>Evaluated <strong>left to right</strong> — stops at first <code>false</code></li>
<li>Put the cheapest or most-likely-to-fail check first</li>
<li>This pattern appears in every validation block you write for the rest of the course</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="10" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="51">

<h2 id="raise-your-hand-2">Raise Your Hand</h2>
<pre><code class="language-matlab">x = <span class="hljs-number">15</span>;

<span class="hljs-keyword">if</span> x &gt; <span class="hljs-number">10</span>
    <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;greater than 10&quot;</span>);
<span class="hljs-keyword">end</span>

<span class="hljs-keyword">if</span> x &gt; <span class="hljs-number">5</span>
    <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;greater than 5&quot;</span>);
<span class="hljs-keyword">end</span>
</code></pre>
<blockquote>
<p>&quot;Both conditions are true — how many <code>disp</code> lines run?&quot;</p>
</blockquote>
<p><strong>(a)</strong> both run     <strong>(b)</strong> only one runs — <em>hands up</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="both-blocks-run--independent-if-statements">Both Blocks Run — Independent <code>if</code> Statements</h2>
<p>Two separate <code>if</code> blocks are two <strong>independent checks</strong> — MATLAB evaluates each one separately.</p>
<p><code>x = 15</code>: both <code>x &gt; 10</code> and <code>x &gt; 5</code> are true → <strong>both <code>disp</code> lines run</strong></p>
<p>This is correct when you <em>want</em> both to run. It is wrong when you want <strong>mutually exclusive</strong> categories — use <code>elseif</code> to connect them into a single chain (next).</p>
</section>

<h2 id="the-if-else-chain-1">The if-else Chain</h2>

<div style="flex:2;">
<pre><code class="language-matlab"><span class="hljs-keyword">if</span> cond1
    statement_A;   <span class="hljs-comment">% runs when cond1 true</span>
<span class="hljs-keyword">elseif</span> cond2

<div style="font-size:0.78em; color:#444; margin-top:0.5rem; border-top:1px solid #ddd; padding-top:0.4rem;">

</div>

<h1 id="if-elseif-else-in-practice">if-elseif-else in Practice</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="live-demo-classify-a-sensor-reading">Live Demo: Classify a Sensor Reading</h2>
<p>Problem: classify a resultant value <code>R</code> as <code>&quot;resting&quot;</code>, <code>&quot;active&quot;</code>, or <code>&quot;impact&quot;</code></p>
<pre><code class="language-matlab">R = <span class="hljs-number">18.4</span>;   <span class="hljs-comment">% resultant acceleration (m/s^2)</span>

<span class="hljs-keyword">if</span> R &lt; <span class="hljs-number">10</span>
    category = <span class="hljs-string">&quot;resting&quot;</span>;
<span class="hljs-keyword">elseif</span> R &lt; <span class="hljs-number">20</span>
    category = <span class="hljs-string">&quot;active&quot;</span>;
<span class="hljs-keyword">else</span>
    category = <span class="hljs-string">&quot;impact&quot;</span>;
<span class="hljs-keyword">end</span>

<span class="hljs-built_in">disp</span>(category)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="raise-your-hand-5">Raise Your Hand</h2>
<div style="display:flex; gap:1.5rem; align-items:flex-start;">
<div style="flex:1;">
<pre style="background:#f0f0f0; padding:0.6rem 0.8rem; border-radius:4px; font-size:0.8em; line-height:1.5; color:#333;">% Version A — uses <span style="color:#cc0000; font-weight:bold;">&lt;=</span>
if R <span style="color:#cc0000; font-weight:bold;">&lt;=</span> 10
    category = "resting";
elseif R <span style="color:#cc0000; font-weight:bold;">&lt;=</span> 20
    category = "active";
else
    category = "impact";
end
</pre>
</div>
<div style="flex:1;">
<pre style="background:#f0f0f0; padding:0.6rem 0.8rem; border-radius:4px; font-size:0.8em; line-height:1.5; color:#333;">% Version B — uses <span style="color:#cc0000; font-weight:bold;">&lt;</span>
if R <span style="color:#cc0000; font-weight:bold;">&lt;</span> 10
    category = "resting";
elseif R <span style="color:#cc0000; font-weight:bold;">&lt;</span> 20
    category = "active";
else
    category = "impact";
end
</pre>
</div>
</div>
<p><code>R = 10</code></p>
<blockquote>
<p>&quot;Do Version A and Version B give the same result?&quot;</p>
</blockquote>
<p><strong>(a)</strong> same result     <strong>(b)</strong> different results — <em>hands up</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="version-a-and-version-b-give-different-results">Version A and Version B Give Different Results</h2>
<p><code>R = 10</code> triggers different branches:</p>
<table>
<thead>
<tr>
<th></th>
<th>Condition tested first</th>
<th>Result</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Version A</strong></td>
<td><code>R &lt;= 10</code> → <code>10 &lt;= 10</code> → <strong>true</strong></td>
<td><code>&quot;resting&quot;</code></td>
</tr>
<tr>
<td><strong>Version B</strong></td>
<td><code>R &lt; 10</code> → <code>10 &lt; 10</code> → <strong>false</strong> → <code>R &lt; 20</code> → true</td>
<td><code>&quot;active&quot;</code></td>
</tr>
</tbody>
</table>
<p><strong>Boundary behavior must be a design decision, not an accident.</strong></p>
<p>Where exactly does <code>&quot;resting&quot;</code> end? Decide consciously — a boundary error in MP3 will produce the wrong category for values right on the edge.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="nested-if-vs-elseif-chain">Nested <code>if</code> vs. <code>elseif</code> Chain</h2>
<p>Two patterns that look similar — the choice depends on whether the checks are <strong>dependent</strong> or <strong>independent</strong>.</p>
<div style="display:flex; gap:1.5rem; align-items:flex-start;">
<div style="flex:1;">
<p><strong>Nested <code>if</code> — inner runs only when outer passes:</strong></p>
<pre><code class="language-matlab"><span class="hljs-comment">% Can only index A(1) when A is non-empty</span>
<span class="hljs-keyword">if</span> ~<span class="hljs-built_in">isempty</span>(A)
    <span class="hljs-keyword">if</span> A(<span class="hljs-number">1</span>) &gt; threshold
        <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;first event exceeds threshold&quot;</span>);
    <span class="hljs-keyword">end</span>
<span class="hljs-keyword">end</span>
</code></pre>
<p><em>The outer check makes the inner one safe to run.</em></p>
</div>
<div style="flex:1;">
<p><strong><code>elseif</code> chain — independent checks, first match wins:</strong></p>
<pre><code class="language-matlab"><span class="hljs-comment">% Two separate problems — checked in sequence</span>
<span class="hljs-keyword">if</span> threshold &lt;= <span class="hljs-number">0</span>
    <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;Error: threshold must be positive.&quot;</span>);
<span class="hljs-keyword">elseif</span> <span class="hljs-built_in">size</span>(sensorData, <span class="hljs-number">2</span>) ~= <span class="hljs-number">4</span>
    <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;Error: wrong number of columns.&quot;</span>);
<span class="hljs-keyword">else</span>
    <span class="hljs-comment">% all clear — process</span>
<span class="hljs-keyword">end</span>
</code></pre>
</div>
</div>
<p><strong>Rule:</strong> inner check only makes sense after the outer passes → nest     independent alternatives → <code>elseif</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="when--is-not-enough">When <code>&amp;</code> Is Not Enough</h2>
<p>Natural instinct — write the dependent check as one compound condition:</p>
<pre><code class="language-matlab"><span class="hljs-comment">% Attempt — what happens when A is empty?</span>
<span class="hljs-keyword">if</span> ~<span class="hljs-built_in">isempty</span>(A) &amp; A(<span class="hljs-number">1</span>) &gt; threshold
    <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;first event exceeds threshold&quot;</span>);
<span class="hljs-keyword">end</span>
</code></pre>
<p><code>&amp;</code> <strong>always evaluates both sides.</strong> When <code>A</code> is empty, <code>A(1)</code> throws an index error before <code>&amp;</code> can do anything.</p>
<p><strong>Two ways to fix this — Fix 1: nested <code>if</code></strong></p>
<pre><code class="language-matlab"><span class="hljs-keyword">if</span> ~<span class="hljs-built_in">isempty</span>(A)             <span class="hljs-comment">% evaluated first</span>
    <span class="hljs-keyword">if</span> A(<span class="hljs-number">1</span>) &gt; threshold    <span class="hljs-comment">% only reached when A is non-empty</span>
        <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;first event exceeds threshold&quot;</span>);
    <span class="hljs-keyword">end</span>
<span class="hljs-keyword">end</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="fixing-it-with">Fixing It with <code>&amp;&amp;</code></h2>
<p><strong>Fix 2: <code>&amp;&amp;</code> short-circuits</strong> — the right side is <strong>never evaluated</strong> when the left side is <code>false</code>:</p>
<pre><code class="language-matlab"><span class="hljs-comment">% A(1) is never reached when A is empty:</span>
<span class="hljs-keyword">if</span> ~<span class="hljs-built_in">isempty</span>(A) &amp;&amp; A(<span class="hljs-number">1</span>) &gt; threshold
    <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;first event exceeds threshold&quot;</span>);
<span class="hljs-keyword">end</span>
</code></pre>
<p>Two tools, same protection:</p>
<table>
<thead>
<tr>
<th>Approach</th>
<th>When to use</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Nested <code>if</code></strong></td>
<td>Always works — any operator, arrays or scalars</td>
</tr>
<tr>
<td><strong><code>&amp;&amp;</code></strong></td>
<td>More concise — scalars only</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="30" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="input-validation-pattern--every-function-that-receives-external-data-should-validate-its-inputs">Input Validation Pattern — every function that receives external data should validate its inputs</h2>
<pre><code class="language-matlab"><span class="hljs-function"><span class="hljs-keyword">function</span> <span class="hljs-params">[ts, A, avgA]</span> = <span class="hljs-title">detectRapidAcceleration</span><span class="hljs-params">(sensorData, threshold)</span></span>
<span class="hljs-comment">% Detects samples where resultant acceleration exceeds threshold.</span>
<span class="hljs-comment">% Inputs:</span>
<span class="hljs-comment">%   sensorData  - N×4 double   raw accelerometer data [X Y Z Resultant]</span>
<span class="hljs-comment">%   threshold   - 1×1 double   detection threshold (m/s^2), must be &gt; 0</span>
<span class="hljs-comment">% Outputs:</span>
<span class="hljs-comment">%   ts    - 1×M double   elapsed times of detected events (s)</span>
<span class="hljs-comment">%   A     - 1×M double   resultant values at detected events (m/s^2)</span>
<span class="hljs-comment">%   avgA  - 1×1 double   mean of A, or 0.0 when no events detected</span>
<span class="hljs-keyword">if</span> threshold &lt;= <span class="hljs-number">0</span>
    <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;Error: threshold must be positive.&quot;</span>);
    ts = [];  A = [];  avgA = <span class="hljs-number">0.0</span>;
    <span class="hljs-keyword">return</span>
<span class="hljs-keyword">end</span>
<span class="hljs-comment">% ... rest of function</span>
<span class="hljs-keyword">end</span>
</code></pre>
<ul>
<li>Header comment states types and constraints — readers know what is valid before touching the code</li>
<li><code>return</code> exits immediately; set <strong>all</strong> outputs before it — <strong>fail loud and early</strong>, not silently with wrong results</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="31" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="the-avga-guard">The <code>avgA</code> Guard</h2>
<p><em>Deferred from L5 — now you have <code>if-else</code>.</em></p>
<p>What if detection runs but finds no events? <code>mean([])</code> returns <code>NaN</code> — wrong for MP3.</p>
<div style="display:flex; gap:1.5rem; align-items:flex-start;">
<div style="flex:2;">
<pre><code class="language-matlab">ss = A_resultant &gt; threshold;
A  = A_resultant(ss);
ts = t_elapsed(ss);

<span class="hljs-keyword">if</span> <span class="hljs-built_in">isempty</span>(A)
    avgA = <span class="hljs-number">0.0</span>;    <span class="hljs-comment">% no events — return safe default</span>
<span class="hljs-keyword">else</span>
    avgA = <span class="hljs-built_in">mean</span>(A);
<span class="hljs-keyword">end</span>
</code></pre>
</div>
<div style="flex:1; background:#fffbe6; padding:0.6rem 0.8rem; border-left:4px solid #C99700; font-size:0.82em;">
<p><strong>Why <code>0.0</code> is correct here</strong></p>
<p><code>avgA</code> is an average of acceleration magnitudes — a count-weighted quantity. When the event count is zero, the sum is zero and so is the average.</p>
<p><code>0.0</code> is not a placeholder — it is the mathematically correct answer for zero events.</p>
<p><code>NaN</code> would be wrong: it propagates silently through every downstream calculation.</p>
</div>
</div>
<ul>
<li><code>isempty(A)</code> is true when no events exceeded the threshold</li>
<li>The autograder tests this case explicitly</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="32" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="edge-cases-nan-and-inf-in-sensor-data">Edge Cases: NaN and Inf in Sensor Data</h2>
<p>Special floating-point values that appear in real sensor pipelines:</p>
<table>
<thead>
<tr>
<th>Value</th>
<th>Produced by</th>
<th>Example</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>NaN</code></td>
<td><code>0/0</code>, <code>mean([])</code>, missing data</td>
<td>GPS channel drop-out</td>
</tr>
<tr>
<td><code>Inf</code></td>
<td><code>x/0</code> where <code>x &gt; 0</code></td>
<td>Divide by zero in a derived channel</td>
</tr>
<tr>
<td><code>-Inf</code></td>
<td><code>x/0</code> where <code>x &lt; 0</code></td>
<td></td>
</tr>
</tbody>
</table>
<pre><code class="language-matlab"><span class="hljs-number">0</span> / <span class="hljs-number">0</span>       <span class="hljs-comment">% → NaN</span>
<span class="hljs-number">1</span> / <span class="hljs-number">0</span>       <span class="hljs-comment">% → Inf</span>
<span class="hljs-built_in">mean</span>([])    <span class="hljs-comment">% → NaN   (no events — the avgA case)</span>
</code></pre>
<p><code>NaN</code> propagates silently — every arithmetic operation on <code>NaN</code> returns <code>NaN</code>. A condition that looks right gives the wrong answer when <code>NaN</code> is present.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="detecting-nan-and-inf-in-branches">Detecting NaN and Inf in Branches</h2>
<pre><code class="language-matlab">x == NaN        <span class="hljs-comment">% always false — NaN is not equal to anything, including itself</span>
<span class="hljs-built_in">isnan</span>(x)        <span class="hljs-comment">% correct: true when x is NaN  (works element-wise on arrays)</span>
<span class="hljs-built_in">isinf</span>(x)        <span class="hljs-comment">% true for +Inf and -Inf</span>
<span class="hljs-built_in">isfinite</span>(x)     <span class="hljs-comment">% true only when x is neither NaN nor Inf</span>
</code></pre>
<p>Use <code>isfinite</code> as a general-purpose guard in input validation:</p>
<pre><code class="language-matlab"><span class="hljs-keyword">if</span> ~<span class="hljs-built_in">isfinite</span>(threshold)
    <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;Error: threshold must be a finite number.&quot;</span>);
    ts = []; A = []; avgA = <span class="hljs-number">0.0</span>;
    <span class="hljs-keyword">return</span>
<span class="hljs-keyword">end</span>
</code></pre>
<ul>
<li><code>isfinite</code> catches both <code>NaN</code> and <code>Inf</code> in one check</li>
<li>Add this guard alongside the <code>threshold &lt;= 0</code> check in <code>detectRapidAcceleration</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="mp3-connection-validation-makes-code-robust">MP3 Connection: Validation Makes Code Robust</h2>
<p><strong>Before today:</strong></p>
<pre><code>detectRapidAcceleration(sensorData, -5)    → runs, returns nonsense
detectRapidAcceleration(sensorData, 100)   → avgA = NaN, no message
detectRapidAcceleration(sensorData, Inf)   → silent wrong result
</code></pre>
<p><strong>After Activity 1:</strong></p>
<pre><code>detectRapidAcceleration(sensorData, -5)    → clear error message, safe empty outputs
detectRapidAcceleration(sensorData, 100)   → avgA = 0.0, informational message
detectRapidAcceleration(sensorData, Inf)   → clear error message, safe empty outputs
</code></pre>
<p><strong>A function that communicates its own failure is a professional-grade function.</strong></p>
</section>

<h2 id="activity-1--discussion">Activity 1 — Discussion</h2>
<p><strong>Discussion anchors:</strong></p>
<ul>
<li>Where did you place <code>return</code> — and what error appeared when an output was not yet set?</li>
<li>Why is <code>avgA = 0.0</code> the right contract and not <code>NaN</code>?</li>
<li>What would the caller need to do when <code>ts</code> is empty?</li>
</ul>
<p><strong>Teaching point:</strong> <code>return</code> requires every declared output to be assigned before it is reached. <code>NaN</code> propagates silently through all downstream calculations — <code>0.0</code> is an explicit safe contract that the caller can test with <code>avgA == 0.0 &amp; isempty(A)</code>.</p>
</section>

<div style="flex:2;">
<pre><code class="language-matlab"><span class="hljs-keyword">switch</span> expression
    <span class="hljs-keyword">case</span> value1
        statement_A;
    <span class="hljs-keyword">case</span> value2
        statement_B;
    <span class="hljs-keyword">case</span> {value3, value4}
        statement_C;
    <span class="hljs-keyword">otherwise</span>
        statement_D;
<span class="hljs-keyword">end</span>
</code></pre>
</div>
</div>
<div style="font-size:0.78em; color:#444; margin-top:0.5rem; border-top:1px solid #ddd; padding-top:0.4rem;">

</div>

<h2 id="live-demo-switch-on-a-signal-name">Live Demo: Switch on a Signal Name</h2>
<pre><code class="language-matlab">signalName = <span class="hljs-string">&quot;Y&quot;</span>;

<span class="hljs-keyword">switch</span> signalName
    <span class="hljs-keyword">case</span> <span class="hljs-string">&quot;X&quot;</span>
        col = <span class="hljs-number">1</span>;
    <span class="hljs-keyword">case</span> <span class="hljs-string">&quot;Y&quot;</span>
        col = <span class="hljs-number">2</span>;
    <span class="hljs-keyword">case</span> <span class="hljs-string">&quot;Z&quot;</span>
        col = <span class="hljs-number">3</span>;
    <span class="hljs-keyword">case</span> <span class="hljs-string">&quot;Resultant&quot;</span>
        col = <span class="hljs-number">4</span>;
    <span class="hljs-keyword">otherwise</span>
        <span class="hljs-built_in">disp</span>(<span class="hljs-string">&quot;Unknown signal name.&quot;</span>);
        col = NaN;
<span class="hljs-keyword">end</span>

<span class="hljs-built_in">disp</span>(col)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="42" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="switch-vs-elseif-chain--when-to-use-each"><code>switch</code> vs. <code>elseif</code> Chain — When to Use Each</h2>
<table>
<thead>
<tr>
<th>Use <code>switch</code> when...</th>
<th>Use <code>elseif</code> chain when...</th>
</tr>
</thead>
<tbody>
<tr>
<td>Testing one variable against fixed values</td>
<td>Conditions involve comparisons (<code>&gt;</code>, <code>&lt;</code>, ranges)</td>
</tr>
<tr>
<td>String or integer dispatch</td>
<td>Multiple variables involved</td>
</tr>
<tr>
<td>Readability matters — many cases</td>
<td>Conditions are complex expressions</td>
</tr>
</tbody>
</table>
<p>Both are valid. <code>switch</code> is often more readable for dispatch tables.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="43" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="preview-mp5-gui-dropdown-callback">Preview: MP5 GUI Dropdown Callback</h2>
<p>In MP5, your GUI has a dropdown: <code>&quot;X&quot;</code>, <code>&quot;Y&quot;</code>, <code>&quot;Z&quot;</code>, <code>&quot;Resultant&quot;</code></p>
<pre><code class="language-matlab"><span class="hljs-function"><span class="hljs-keyword">function</span> <span class="hljs-title">DropDownValueChanged</span><span class="hljs-params">(app, event)</span></span>
<span class="hljs-comment">% Called when the signal dropdown selection changes.</span>
<span class="hljs-comment">%</span>
<span class="hljs-comment">% Inputs:</span>
<span class="hljs-comment">%   app    - App Designer app object  holds UI components and sensor data</span>
<span class="hljs-comment">%   event  - event data               not used directly</span>
<span class="hljs-comment">%</span>
<span class="hljs-comment">% Outputs: none — updates app.CurrentData and refreshes the plot in place</span>

    signalName = app.SignalDropDown.Value;
    col = getColumn(signalName);   <span class="hljs-comment">% the function you write today</span>
    app.CurrentData = app.SensorData(:, col);
    updatePlot(app);
<span class="hljs-keyword">end</span>
</code></pre>
<p><strong>The <code>getColumn</code> function you build in Activity 2 is a direct component of your MP5 app.</strong></p>
</section>

<h1 id="activity-2-signal-classifier--getcolumn">Activity 2: Signal Classifier — <code>getColumn</code></h1>
<p><strong>Teams of 3–4 | 16 min working + 4 min debrief</strong></p>
<p><strong>Goal:</strong> Write a <code>switch</code>-based function that maps signal names to column indices.</p>
<pre><code class="language-matlab"><span class="hljs-comment">% Specification:</span>
<span class="hljs-comment">% &quot;X&quot;         --&gt; column 1</span>
<span class="hljs-comment">% &quot;Y&quot;         --&gt; column 2</span>
<span class="hljs-comment">% &quot;Z&quot;         --&gt; column 3</span>
<span class="hljs-comment">% &quot;Resultant&quot; --&gt; column 4</span>
<span class="hljs-comment">% otherwise   --&gt; display error, return NaN</span>
</code></pre>
<p><strong>Extension:</strong> Add a second output — the y-axis label string for each signal.</p>
<p><strong>Open handout — Activity 2. Write pseudocode before coding.</strong></p>
</section>

<h2 id="activity-2--debrief">Activity 2 — Debrief</h2>
<blockquote>
<p>&quot;Raise your hand if <code>getColumn(&quot;x&quot;)</code> returned the same result as <code>getColumn(&quot;X&quot;)</code>.&quot;</p>
</blockquote>
<p><strong>(a)</strong> same result     <strong>(b)</strong> different results — <em>hands up</em></p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="46" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="51">
<h2 id="activity-2--discussion">Activity 2 — Discussion</h2>
<p><strong>Discussion anchors:</strong></p>
<ul>
<li>String matching in <code>switch</code> is case-sensitive — is that a bug or a design decision?</li>
<li>How would you make <code>getColumn</code> case-insensitive in one line?</li>
<li>Where does <code>getColumn</code> connect to your MP5 app?</li>
</ul>
<p><strong>Teaching point:</strong> <code>switch</code> does exact-match string comparison. Case sensitivity is a design decision — <code>lower(signalName)</code> before the <code>switch</code> makes it robust to input variation. Returning a label string makes the function composable: one call sets both the data column and the axis label.</p>
</section>

<h2 id="three-tools-three-use-cases">Three Tools, Three Use Cases</h2>
<table>
<thead>
<tr>
<th>Tool</th>
<th>Use when...</th>
<th>MP example</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>if-else</code></td>
<td>Binary decision</td>
<td>Threshold exceeded or not</td>
</tr>
<tr>
<td><code>if-elseif-else</code></td>
<td>Multiple exclusive categories</td>
<td><code>&quot;resting&quot;</code> / <code>&quot;active&quot;</code> / <code>&quot;impact&quot;</code></td>
</tr>
<tr>
<td><code>switch</code></td>
<td>Dispatch on fixed string/integer values</td>
<td>Signal name → column index</td>
</tr>
</tbody>
</table>
</section>

<h2 id="coming-up-objects">Coming Up: Objects</h2>
<p>L7 brings OOP. Why does this matter now?</p>
<ul>
<li>You have <code>logging.m</code>, <code>dataAnalysis.m</code>, <code>detectRapidAcceleration.m</code> — three scripts/functions sharing data</li>
<li>OOP packages them into one object that owns its own data</li>
<li><strong>Before L7:</strong> complete ZyBooks RA — read the <code>classdef</code> syntax (ZyBooks Ch. 13)</li>
</ul>

<p>&quot;Everything you've built in Labs 1–3 will fit inside one class by the end of Lab 4.&quot;</p>
