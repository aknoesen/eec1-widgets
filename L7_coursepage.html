</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="4" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="warm-up-the-pain-of-loose-code">Warm-Up: The Pain of Loose Code</h2>
<blockquote>
<p>&quot;In MP1–MP3 you wrote scripts that kept sensor data, timestamps, and a processing step in loose variables and functions. If you were asked to (a) add a second sensor, or (b) run two logging sessions back-to-back in the same program — what would start to hurt? Name one concrete pain point.&quot;</p>
</blockquote>
<p><strong>On your own — 60 seconds of writing, then share with a neighbor.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="three-patterns-oop-solves-2">Three Patterns OOP Solves</h2>
<p><strong>Pain 1: &quot;Too many variables with similar names&quot;</strong><br />
→ <strong>Bundling</strong> — an object owns its own data; names live inside the object, not the workspace</p>
<p><strong>Pain 2: &quot;I accidentally overwrote my data&quot;</strong><br />
→ <strong>Invariant protection</strong> — the class enforces the rules from inside; outside code cannot corrupt state</p>
<p><strong>Pain 3: &quot;I had to copy the whole pipeline for a second run&quot;</strong><br />
→ <strong>Multiple instances</strong> — one class definition, as many independent objects as you need</p>
<div style="border: 2px dashed #888; border-radius: 14px; padding: 0.5rem 1rem; background: #f9f9f9; font-size: 0.88em; margin: 0.4rem 0;">
An <strong>instance</strong> is one concrete object created from a class — the class is the blueprint, each instance is a separate, independent object built from it. <code>account1 = BankAccount(100, 2020, "Alice")</code> creates one instance; <code>account2 = BankAccount(200, 2019, "Bob")</code> creates another. Same blueprint, two independent objects.
</div>
<p>Three different pains, one answer: a class bundles state and behavior, protects invariants, and gives you a template for as many instances as you need.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="8" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="52">
<h1 id="classdef-anatomy">classdef Anatomy</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="bankaccount-the-three-part-structure">BankAccount: The Three-Part Structure</h2>
<pre><code class="language-matlab"><span class="hljs-keyword">classdef</span> BankAccount
    <span class="hljs-comment">% BankAccount  A simple value class tracking a bank account.</span>
    <span class="hljs-keyword">properties</span>
        name            <span class="hljs-comment">% 1×1 string — account holder name</span>
        accountBalance  <span class="hljs-comment">% 1×1 double — current balance in dollars</span>
        customerSince   <span class="hljs-comment">% 1×1 double — year account was opened</span>
    <span class="hljs-keyword">end</span>
    <span class="hljs-keyword">methods</span>
        <span class="hljs-comment">% Constructor and all other methods go here</span>
    <span class="hljs-keyword">end</span>
<span class="hljs-keyword">end</span>  <span class="hljs-comment">% classdef</span>
</code></pre>
<p>Three structural rules:</p>
<ul>
<li>One class = one file; <strong>file name must match the class name exactly</strong></li>
<li><code>properties</code> block declares data fields; <code>methods</code> block contains all functions</li>
<li>Every <code>end</code> matters — a missing <code>end</code> is the most common classdef syntax error</li>
</ul>
<p><strong>Tip:</strong> The MATLAB Editor includes a built-in class template — <strong>New → Class</strong> opens a pre-structured <code>classdef</code> scaffold.</p>
</section>

<h2 id="matlab-class-template">MATLAB Class Template</h2>

<h2 id="the-constructor-1">The Constructor</h2>
<pre><code class="language-matlab"><span class="hljs-function"><span class="hljs-keyword">function</span> <span class="hljs-title">obj</span> = <span class="hljs-title">BankAccount</span><span class="hljs-params">(startingBalance, startingYear, name)</span></span>
<span class="hljs-comment">% BankAccount  Construct a bank account.</span>
<span class="hljs-comment">% Inputs:</span>
<span class="hljs-comment">%   startingBalance - 1×1 double  opening balance in dollars</span>
<span class="hljs-comment">%   startingYear    - 1×1 double  year the account was opened</span>
<span class="hljs-comment">%   name            - 1×1 string  account holder name</span>
<span class="hljs-comment">% Outputs:</span>
<span class="hljs-comment">%   obj - 1×1 BankAccount  the new account object</span>
    obj.accountBalance = startingBalance;
    obj.customerSince  = startingYear;
    obj.name           = name;
<span class="hljs-keyword">end</span>
</code></pre>
<ul>
<li>Constructor name = class name; returns <code>obj</code> — the newly created object</li>
<li><code>obj</code> is convention, not a keyword (other languages call it <code>self</code>)</li>
<li>Every property should be initialized in the constructor</li>
</ul>
<div style="background:#f0f0f0; padding:0.4rem 0.9rem; border-left:4px solid #002855; font-size:0.85em; margin-top:0.4rem;">
**Constructor writes; only class methods can read or write private properties after that.**
Everything <code>private</code> gets its value here — no code outside the class can set it directly.
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="13" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="access-modifiers-protecting-properties">Access Modifiers: Protecting Properties</h2>
<pre><code class="language-matlab"><span class="hljs-keyword">classdef</span> BankAccount
    <span class="hljs-keyword">properties</span> (SetAccess = immutable)
        name            <span class="hljs-comment">% 1×1 string — write-once in constructor; readable from anywhere</span>
    <span class="hljs-keyword">end</span>
    <span class="hljs-keyword">properties</span> (Access = private)
        accountBalance  <span class="hljs-comment">% 1×1 double — read and write blocked from outside the class</span>
        customerSince   <span class="hljs-comment">% 1×1 double — read and write blocked from outside the class</span>
    <span class="hljs-keyword">end</span>
    ...
<span class="hljs-keyword">end</span>
</code></pre>
<div style="display:flex; gap:1.5rem; align-items:flex-start; margin-top:0.4rem;">
<div style="flex:1; background:#f0f0f0; padding:0.5rem 0.8rem; border-left:4px solid #002855; font-size:0.82em;">
<p><span style="color:#cc0000; font-weight:bold;"><code>SetAccess = immutable</code></span> <em>(immutable = unable to change)</em> — <code>name</code></p>
<ul>
<li>Constructor writes it once</li>
<li>Anyone can read it: <code>account.name</code> → <code>&quot;Alice&quot;</code></li>
<li>No reassignment after construction — <code>account.name = &quot;Bob&quot;</code> → error</li>
</ul>
</div>
<div style="flex:1; background:#f0f0f0; padding:0.5rem 0.8rem; border-left:4px solid #002855; font-size:0.82em;">
<p><span style="color:#cc0000; font-weight:bold;"><code>Access = private</code></span> — <code>accountBalance</code>, <code>customerSince</code></p>
<ul>
<li>Constructor writes; only class methods read or write</li>
<li><code>account.accountBalance</code> at the command line → error</li>
<li>All balance changes must go through <code>Deposit</code> or <code>Withdraw</code></li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="deposit-returns-a-new-object">Deposit Returns a New Object</h2>
<pre style="background:#f0f0f0; color:#111; padding:0.8rem 1rem; border-radius:4px; border-left:4px solid #bbb; font-size:0.88rem; line-height:1.5; overflow:visible;">function <strong style="color:#cc0000;">obj</strong> = Deposit(<strong style="color:#cc0000;">obj</strong>, amount)
% Deposit  Add amount to the balance and return the updated account.
% Inputs:
%   obj    - 1×1 BankAccount  the account to deposit into
%   amount - 1×1 double       amount to add in dollars
% Outputs:
%   obj - 1×1 BankAccount  new account object with updated balance
    obj.accountBalance = obj.accountBalance + amount;
end</pre>
<p>The method <strong>returns</strong> <code>obj</code>. This is the signature of a <strong>value class</strong>.</p>
<p><span style="color:#cc0000; font-weight:bold;">Value class: every object is a self-contained, independent piece of data. Assignment (<code>b = a</code>) copies everything. A method that mutates (changes) the object's data must return the updated copy</span> — the caller must reassign to see the change:</p>
<pre><code class="language-matlab">account = account.Deposit(<span class="hljs-number">50</span>);   <span class="hljs-comment">% ✓ balance is now 150</span>
account.Deposit(<span class="hljs-number">50</span>);             <span class="hljs-comment">% ✗ new copy built and thrown away — balance unchanged</span>
</code></pre>
<p><code>BankAccount</code> also has <code>Withdraw</code>, <code>CheckBalance</code>, and <code>plus</code> — those are provided; we will look at <code>plus</code> later in this lecture.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="creating-a-bankaccount-object">Creating a BankAccount Object</h2>
<pre><code class="language-matlab">account = BankAccount(<span class="hljs-number">100</span>, <span class="hljs-number">2020</span>, <span class="hljs-string">&quot;Alice&quot;</span>);
account.name              <span class="hljs-comment">% → &quot;Alice&quot;  (SetAccess = immutable — readable)</span>
account.CheckBalance()    <span class="hljs-comment">% → 100      (private balance — accessed through method)</span>
account.name = <span class="hljs-string">&quot;Bob&quot;</span>      <span class="hljs-comment">% → error    (SetAccess = immutable)</span>
account.accountBalance    <span class="hljs-comment">% → error    (Access = private)</span>
</code></pre>
<ul>
<li><code>BankAccount(...)</code> calls the constructor — returns one object</li>
<li><code>name</code> is readable via dot notation — <code>SetAccess = immutable</code> allows reading</li>
<li><code>accountBalance</code> and <code>customerSince</code> are private — only reachable through methods</li>
<li>Dot notation accesses <strong>properties</strong> and calls <strong>methods</strong>: <code>account.name</code> returns the value directly; <code>account.CheckBalance()</code> runs the method</li>
<li>The <code>()</code> are what tell MATLAB to run a method — without them, MATLAB does not execute it and you get no result</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">

<h1 id="activity-1-write-a-transfer-method">Activity 1: Write a Transfer Method</h1>
<h2 id="teams-of-3%E2%80%934--7-min-working--3-min-debrief">Teams of 3–4 | 7 min working + 3 min debrief</h2>
<p><strong>Goal:</strong> Write a method that moves money from one <code>BankAccount</code> to another — and observe exactly what value class semantics cost you.</p>
<ol>
<li>Open MATLAB. Add a <code>Transfer</code> method inside <code>BankAccount.m</code> (skeleton on the handout).</li>
<li>Fill in the method body. Before running: write your predicted balances for the test case.</li>
<li>Run the test case. If the result does not match your prediction, find the bug.</li>
<li>Answer the three questions on the handout based on what you observed.</li>
</ol>
<div style="text-align:center; margin-top:1.2rem;">
<span style="font-size:1.1em; font-weight:bold;">aknoesen.github.io/eec1-widgets/BankAccount.m</span>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="bankaccountm">BankAccount.m</h2>
<pre style="font-size:0.6em; line-height:1.25; padding:0.5rem 0.8rem; background:#f0f0f0; border-left:4px solid #bbb; border-radius:4px; overflow:visible;">classdef BankAccount
% BankAccount  A simple value class tracking a bank account.
    properties (SetAccess = immutable)
        name            % 1×1 string — account holder name; write-once in constructor
    end
    properties (Access = private)
        accountBalance  % 1×1 double — current balance in dollars
        customerSince   % 1×1 double — year account was opened
    end
    methods
        function obj = BankAccount(startingBalance, startingYear, name)
        % BankAccount  Construct a bank account.
            obj.accountBalance = startingBalance;
            obj.customerSince  = startingYear;
            obj.name           = name;
        end
        function obj = Deposit(obj, amount)
        % Deposit  Add amount to the balance and return the updated account.
            obj.accountBalance = obj.accountBalance + amount;
        end
        function obj = Withdraw(obj, amount)
        % Withdraw  Subtract amount from the balance and return the updated account.
            obj.accountBalance = obj.accountBalance - amount;
        end
        function bal = CheckBalance(obj)
        % CheckBalance  Return the current balance.
            bal = obj.accountBalance;
        end
        function obj = plus(objA, objB)
        % plus  Merge two accounts by combining their balances.
            newBalance   = objA.CheckBalance() + objB.CheckBalance();
            startingYear = min(objA.customerSince, objB.customerSince);
            custName     = objA.name + ", " + objB.name;
            obj          = BankAccount(newBalance, startingYear, custName);
        end
        <strong style="color:#cc0000;">% ── ACTIVITY 1: Add your Transfer method here ──</strong>
    end % methods
end % classdef</pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="activity-1--debrief">Activity 1 — Debrief</h2>
<blockquote>
<p>&quot;Raise your hand if your <code>Transfer</code> method ran correctly on the first try.&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="activity-1--discussion">Activity 1 — Discussion</h2>
<p><strong>Discussion anchors:</strong></p>
<ul>
<li>Why does <code>Transfer</code> return two objects instead of one?</li>
<li>What goes wrong if you write <code>objA.Deposit(amount)</code> without reassigning?</li>
<li>How would <code>Transfer</code> look different if <code>BankAccount</code> were a handle class? <em>(handle classes coming up later this lecture)</em></li>
</ul>
<p><strong>Teaching point:</strong> Value classes require returning and reassigning at every mutation — two objects in, two objects out, every time. That ceremony is what handle classes eliminate <em>(more on this shortly)</em> — it is also why <code>SensorDataAnalyzer</code> must be a handle class.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="21" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="52">
<h1 id="when-oop-earns-its-keep">When OOP Earns Its Keep</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="two-logging-sessions-the-procedural-way">Two Logging Sessions: The Procedural Way</h2>
<pre><code class="language-matlab"><span class="hljs-comment">% Session 1</span>
rawData1      = [];
timestamps1   = [];
signalName1   = <span class="hljs-string">&quot;&quot;</span>;
isIntegrated1 = <span class="hljs-built_in">false</span>;

<span class="hljs-comment">% Session 2 — copy everything</span>
rawData2      = [];
timestamps2   = [];
signalName2   = <span class="hljs-string">&quot;&quot;</span>;
isIntegrated2 = <span class="hljs-built_in">false</span>;
</code></pre>
<p>Four variables × two sessions = eight names to manage in the workspace.</p>
<p>Add a third session or a second sensor axis — the list doubles again. The invariant &quot;these four things describe one coherent signal&quot; is scattered across whoever remembers to keep them in sync.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="two-logging-sessions-with-a-class">Two Logging Sessions: With a Class</h2>
<pre><code class="language-matlab"><span class="hljs-comment">% Session 1</span>
session1 = SensorDataAnalyzer();
session1.logSensorData(<span class="hljs-number">15</span>, <span class="hljs-number">3</span>);
session1.setTargetSignal(<span class="hljs-string">&quot;X-Accel&quot;</span>);

<span class="hljs-comment">% Session 2 — one more line, not eight more variables</span>
session2 = SensorDataAnalyzer();
session2.logSensorData(<span class="hljs-number">15</span>, <span class="hljs-number">3</span>);
session2.setTargetSignal(<span class="hljs-string">&quot;Y-Accel&quot;</span>);
</code></pre>
<p>One class definition. Two independent instances.</p>
<p>The invariant lives inside the object — no caller can accidentally break the connection between a signal and its timestamps.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="24" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="52">
<h1 id="operator-overloading">Operator Overloading</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="plus-on-bankaccount-1"><code>plus()</code> on BankAccount</h2>
<pre><code class="language-matlab">acct1  = BankAccount(<span class="hljs-number">100</span>, <span class="hljs-number">2020</span>, <span class="hljs-string">&quot;Alice&quot;</span>);   <span class="hljs-comment">% two BankAccount instances</span>
acct2  = BankAccount(<span class="hljs-number">200</span>, <span class="hljs-number">2019</span>, <span class="hljs-string">&quot;Bob&quot;</span>);
merged = acct1 + acct2;
</code></pre>
<p>When MATLAB sees <code>+</code> and either operand is a <code>BankAccount</code>, it automatically calls the class's <code>plus</code> method instead of doing arithmetic — this is called <strong>dispatching</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="when-to-overload-an-operator">When to Overload an Operator</h2>
<p><code>plus()</code> on <code>BankAccount</code> works. But consider this:</p>
<blockquote>
<p>&quot;What if <code>minus</code> were overloaded so that <code>acct1 - acct2</code> meant 'transfer from acct1 to acct2'? Is that a good design, or a bad one?&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="the-operator-overloading-rule">The Operator Overloading Rule</h2>
<p><strong>Good overload:</strong> <code>+</code> on <code>BankAccount</code> — adding balances is mathematically natural and the meaning is obvious without a comment.</p>
<p><strong>Bad overload:</strong> <code>-</code> to mean transfer — the operation is not a subtraction; a reader needs a comment to understand it.</p>
<p><strong>Rule of thumb:</strong> Overload an operator only when the operation is</p>
<ol>
<li>mathematically natural for the type, and</li>
<li>obvious to a reader without a comment.</li>
</ol>
<p>When in doubt, use a method with a clear name. <code>Transfer(objA, objB, amount)</code> beats <code>objA - acctB</code> every time.</p>
<p>In MP4, use methods with descriptive names — no operator overloading on <code>SensorDataAnalyzer</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="29" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="52">
<h1 id="encapsulation-and-access-modifiers">Encapsulation and Access Modifiers</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="30" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="what-is-encapsulation">What Is Encapsulation?</h2>
<p><strong>Encapsulation</strong> means bundling data and the methods that operate on it together inside a class — and controlling what outside code can see or change.</p>
<p>Think of it as a vending machine: you press a button and get a snack. You never reach inside the machine directly — you interact only through the interface it exposes. The internal mechanism is hidden.</p>
<p>In MATLAB:</p>
<ul>
<li><strong>Properties</strong> hold the data (the machine's internals)</li>
<li><strong>Methods</strong> are the buttons — the only way to interact with the data</li>
<li><strong>Access modifiers</strong> (<code>private</code>, <code>immutable</code>) decide what outside code can touch</li>
</ul>
<div style="border: 2px dashed #888; border-radius: 14px; padding: 0.5rem 1rem; background: #f9f9f9; font-size: 0.88em;">
Encapsulation is not just organisation — it is <strong>protection</strong>. Outside code cannot accidentally (or deliberately) corrupt the object's internal state because it has no direct access to it.
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="32" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="trafficlight-private-state-1">TrafficLight: Private State</h2>
<div style="border: 2px dashed #888; border-radius: 14px; padding: 0.5rem 1rem; background: #f9f9f9; font-size: 0.88em; margin-bottom:0.6rem;">
<code>classdef TrafficLight &lt; handle</code> — the two words <strong>&lt; handle</strong> make this a <strong>handle class</strong>. This changes how assignment and mutation work. Coming up next in this lecture.
</div>
<p><code>light.currState = 17</code> → error. Outside code cannot write <code>currState</code> at all — valid or invalid. The class is the <span style="color:#cc0000; font-weight:bold;">only</span> gatekeeper; states 1, 2, and 3 are the <span style="color:#cc0000; font-weight:bold;">only</span> values that can ever exist.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="sensordataanalyzer-which-properties-are-private">SensorDataAnalyzer: Which Properties Are Private?</h2>
<p><code>SensorDataAnalyzer</code> needs to store four things:</p>
<ul>
<li><code>mobiledevConnection</code> — the live sensor handle</li>
<li><code>rawData</code> — raw accelerometer data (<code>N×4</code>)</li>
<li><code>TargetSignal</code> — the currently selected processed signal</li>
<li><code>TargetSignalTs</code> — timestamps for <code>TargetSignal</code></li>
</ul>
<p><strong>Teams of 3–4 | 2 min</strong> — For each property: <code>Access = private</code> or public? Be ready to make the case.</p>
<blockquote>
<p>&quot;Which of these should be <code>Access = private</code>? Which should be public? Make the case for each.&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="sensordataanalyzer-access-design">SensorDataAnalyzer Access Design</h2>
<div style="display:flex; gap:1.5rem; align-items:flex-start;">
<div style="flex:1; background:#f0f0f0; padding:0.6rem 0.8rem; border-left:4px solid #002855; font-size:0.85em;">
<p><strong>Private</strong></p>
<p><code>mobiledevConnection</code> — if a script reassigns it, the whole pipeline breaks silently</p>
<p><code>rawData</code> — the invariant is &quot;<code>setTargetSignal</code> decides what you get&quot;; expose it and scripts bypass the API</p>
</div>
<div style="flex:1; background:#f0f0f0; padding:0.6rem 0.8rem; border-left:4px solid #002855; font-size:0.85em;">
<p><strong>Public</strong></p>
<p><code>TargetSignal</code> — scripts need to read this for plotting and analysis; reading cannot corrupt anything</p>
<p><code>TargetSignalTs</code> — same reasoning as <code>TargetSignal</code></p>
</div>
</div>
<p>Private: anything that, if written from outside, could silently violate an invariant.<br />
Public: anything scripts legitimately need to read and that cannot be corrupted by reading.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="35" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="error-contracts-failing-loudly-on-bad-input">Error Contracts: Failing Loudly on Bad Input</h2>
<p>Inside <code>setTargetSignal</code> — a method you will write in MP4 that selects which signal (<code>&quot;X-Accel&quot;</code>, <code>&quot;Y-Accel&quot;</code>, etc.) the analyzer works on — what if <code>signalName</code> is not one of the four valid values?</p>
<pre><code class="language-matlab">validNames = [<span class="hljs-string">&quot;X-Accel&quot;</span>, <span class="hljs-string">&quot;Y-Accel&quot;</span>, <span class="hljs-string">&quot;Z-Accel&quot;</span>, <span class="hljs-string">&quot;R-Accel&quot;</span>];
<span class="hljs-keyword">if</span> ~any(strcmp(signalName, validNames))
    error(<span class="hljs-string">&quot;setTargetSignal: signalName must be X-Accel, Y-Accel, Z-Accel, or R-Accel. Got: %s&quot;</span>, signalName);
<span class="hljs-keyword">end</span>
</code></pre>
<p>Compare to MP3's <code>detectRapidAcceleration</code> returning <code>avgA = 0.0</code> silently when the input was empty.</p>
<p>Both are misuse-detection strategies. <code>error()</code> is faster feedback — the bug surfaces at the call site, not three steps later when a plot looks wrong.</p>
<div style="border: 2px dashed #888; border-radius: 14px; padding: 0.5rem 1rem; background: #f9f9f9; font-size: 0.88em; margin-top:0.4rem;">
<strong>In MP4:</strong> add this exact pattern at the top of your <code>setTargetSignal</code> method. It is part of the specification.
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-class="section" data-theme="eng6" lang="en-US" class="section" data-marpit-pagination="36" style="--paginate:true;--class:section;--theme:eng6;" data-marpit-pagination-total="52">
<h1 id="value-classes-and-handle-classes">Value Classes and Handle Classes</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="37" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="value-class-assignment-makes-an-independent-copy">Value Class: Assignment Makes an Independent Copy</h2>
<pre><code class="language-matlab">acctA = BankAccount(<span class="hljs-number">100</span>, <span class="hljs-number">2020</span>, <span class="hljs-string">&quot;Alice&quot;</span>);
acctB = acctA;               <span class="hljs-comment">% independent copy — all data duplicated</span>
acctB = acctB.Deposit(<span class="hljs-number">50</span>);   <span class="hljs-comment">% modify only the copy</span>

acctA.CheckBalance()         <span class="hljs-comment">% → 100   acctA is unchanged</span>
acctB.CheckBalance()         <span class="hljs-comment">% → 150   only acctB changed</span>
</code></pre>
<p>MATLAB's default is <strong>value class semantics</strong>: every assignment copies all data.<br />
Modifying <code>acctB</code> never touches <code>acctA</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="40" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="raise-your-hand-2">Raise Your Hand</h2>
<pre><code class="language-matlab">acctV = BankAccount(<span class="hljs-number">100</span>, <span class="hljs-number">2020</span>, <span class="hljs-string">&quot;Alice&quot;</span>);
acctV.Deposit(<span class="hljs-number">50</span>);       <span class="hljs-comment">% no reassignment</span>
acctV.CheckBalance()     <span class="hljs-comment">% → ?</span>
</code></pre>
<blockquote>
<p>&quot;After calling <code>Deposit(50)</code> with no reassignment — what does <code>CheckBalance()</code> return?&quot;</p>
</blockquote>
<p><strong>(a)</strong> <code>150</code> — Deposit updated the balance     <strong>(b)</strong> <code>100</code> — the balance is unchanged — <em>hands up</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="41" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="why-deposit-left-the-balance-unchanged">Why <code>Deposit</code> Left the Balance Unchanged</h2>
<p><code>Deposit</code> is defined as <code>function obj = Deposit(obj, amount)</code> — it returns a <strong>new</strong> <code>BankAccount</code> object.</p>
<p>Without reassignment, that new object is built and immediately discarded:</p>
<pre><code class="language-matlab">acctV.Deposit(<span class="hljs-number">50</span>);           <span class="hljs-comment">% new object built → thrown away — acctV untouched</span>
acctV = acctV.Deposit(<span class="hljs-number">50</span>);   <span class="hljs-comment">% new object built → assigned → balance is now 150</span>
</code></pre>
<p>This is value class semantics. The caller must explicitly replace the variable to see the change.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="42" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="handle-class-assignment-shares-a-reference">Handle Class: Assignment Shares a Reference</h2>
<p><code>classdef BankAccountHandle &lt; handle</code> — the single word <code>&lt; handle</code> is the only structural change from <code>BankAccount</code>. Use a handle class when the object must accumulate state across calls and the caller should not have to reassign.</p>
<pre><code class="language-matlab">acctH = BankAccountHandle(<span class="hljs-number">100</span>, <span class="hljs-number">2020</span>, <span class="hljs-string">&quot;Alice&quot;</span>);
acctH.Deposit(<span class="hljs-number">50</span>);         <span class="hljs-comment">% no reassignment needed</span>
acctH.CheckBalance()       <span class="hljs-comment">% → 150   modified in place</span>

copy = acctH;              <span class="hljs-comment">% NOT a copy — both point to the same object</span>
copy.Deposit(<span class="hljs-number">50</span>);
acctH.CheckBalance()       <span class="hljs-comment">% → 200   acctH changed too</span>
</code></pre>
<p>Every variable holding the object is an arrow pointing to one shared box. Modifying through any variable modifies the one object.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="44" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="the-mental-model-box-and-arrow-1">The Mental Model: Box and Arrow</h2>
<div style="display:flex; gap:2rem; align-items:flex-start;">
<div style="flex:1; background:#f0f0f0; padding:0.8rem; border-left:4px solid #002855; font-size:0.85em;">
<p><strong>Value class</strong></p>
<p><code>a</code> <strong>is</strong> a box containing <code>Balance = 100</code>.</p>
<p><code>b = a</code> creates a second, identical but independent box.</p>
<p>Modifying <code>b</code>'s box does not touch <code>a</code>'s box.</p>
<p>Deposit must return a new box — the caller must re-point their variable at it.</p>
</div>
<div style="flex:1; background:#f0f0f0; padding:0.8rem; border-left:4px solid #002855; font-size:0.85em;">
<p><strong>Handle class</strong></p>
<p><code>a</code> is an <strong>arrow</strong> pointing to a box containing <code>Balance = 100</code>.</p>
<p><code>b = a</code> gives <code>b</code> an arrow to the <strong>same</strong> box.</p>
<p>Modifying through <code>b</code> changes what <code>a</code> sees — there is only one box.</p>
<p>Deposit modifies the box in place — no reassignment needed.</p>
</div>
</div>
<p><strong>Default to value.</strong> Reach for handle when the object has identity and lifetime — when &quot;the same thing&quot; must change over time and be visible as changed from multiple places.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="45" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="which-kind-must-sensordataanalyzer-be">Which Kind Must SensorDataAnalyzer Be?</h2>
<p>From the MP4 handout, Lab Step 3:</p>
<pre><code class="language-matlab">analyzer = SensorDataAnalyzer();
analyzer.logSensorData(<span class="hljs-number">15</span>, <span class="hljs-number">3</span>);
analyzer.setTargetSignal(<span class="hljs-string">&quot;X-Accel&quot;</span>);
analyzer.integrate();    <span class="hljs-comment">% acceleration → velocity</span>
analyzer.integrate();    <span class="hljs-comment">% velocity     → displacement</span>
analyzer.plotTargetSignal();
</code></pre>
<blockquote>
<p>&quot;Given what you just saw — which must <code>SensorDataAnalyzer</code> be: value or handle? What happens to the lab if it is written as a value class with these exact call patterns?&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="46" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="why-sensordataanalyzer-needs--handle">Why <code>SensorDataAnalyzer</code> Needs <code>&lt; handle</code></h2>
<p>If <code>SensorDataAnalyzer</code> is a value class, every <code>integrate()</code> call builds a modified copy and throws it away:</p>
<pre><code class="language-matlab">analyzer.integrate();    <span class="hljs-comment">% new object with velocity signal → discarded</span>
analyzer.integrate();    <span class="hljs-comment">% new object with velocity signal → discarded again</span>
analyzer.plotTargetSignal();   <span class="hljs-comment">% still showing raw acceleration</span>
</code></pre>
<p>No error. Wrong answer. Silent failure — the hardest kind to debug.</p>
<p><code>classdef SensorDataAnalyzer &lt; handle</code> makes <code>integrate()</code> modify the object in place — which is exactly what the MP4 call pattern requires.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="47" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="one-handle-class-trap">One Handle Class Trap</h2>
<pre><code class="language-matlab">session1 = SensorDataAnalyzer();
session1.logSensorData(<span class="hljs-number">15</span>, <span class="hljs-number">3</span>);
session1.setTargetSignal(<span class="hljs-string">&quot;X-Accel&quot;</span>);

session2 = session1;             <span class="hljs-comment">% NOT a copy — both arrows point to the same object</span>

session2.setTargetSignal(<span class="hljs-string">&quot;Y-Accel&quot;</span>);
session1.TargetSignal            <span class="hljs-comment">% Y-Accel data — session1 changed too</span>
</code></pre>
<p>On a handle class, <code>b = a</code> copies the <strong>arrow</strong>, not the box.</p>
<p>To get a truly independent second session: <code>session2 = SensorDataAnalyzer()</code> — a new object.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-class="activity" data-theme="eng6" lang="en-US" class="activity" data-marpit-pagination="48" style="--paginate:true;--class:activity;--theme:eng6;" data-marpit-pagination-total="52">
<h1 id="activity-2-value-or-handle">Activity 2: Value or Handle?</h1>
<h2 id="teams-of-3%E2%80%934--5-min-working--3-min-debrief">Teams of 3–4 | 5 min working + 3 min debrief</h2>
<p><strong>Goal:</strong> Classify five course-context scenarios and defend each choice.</p>
<table>
<thead>
<tr>
<th>#</th>
<th>Class</th>
<th>One-line description</th>
</tr>
</thead>
<tbody>
<tr>
<td>A</td>
<td><code>SensorDataAnalyzer</code></td>
<td>Logs sensor data, selects a signal, integrates, plots — all via method calls, no reassignment</td>
</tr>
<tr>
<td>B</td>
<td><code>ComplexNumber</code></td>
<td>Stores real + imaginary parts; supports <code>magnitude()</code>, <code>+</code>, <code>−</code></td>
</tr>
<tr>
<td>C</td>
<td><code>Logger</code></td>
<td>Multiple parts of a program append to the <strong>same</strong> shared record</td>
</tr>
<tr>
<td>D</td>
<td><code>GPSWaypoint</code></td>
<td>Stores latitude, longitude, altitude for one fixed location</td>
</tr>
<tr>
<td>E</td>
<td><code>SimulationClock</code></td>
<td>Advances internal time each <code>tick()</code>; other objects read its current time</td>
</tr>
</tbody>
</table>
<ol>
<li>On your own — mark each scenario <strong>V</strong> or <strong>H</strong>. Do not discuss yet. (2 min)</li>
<li>Compare with your team — reach consensus on any disagreements. (3 min)</li>
<li>One of these scenarios is the class you build in today's lab.</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="49" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="activity-2--debrief">Activity 2 — Debrief</h2>
<blockquote>
<p>&quot;Raise your hand if your team classified Scenario A — SensorDataAnalyzer — as a handle class.&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="50" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="activity-2--discussion">Activity 2 — Discussion</h2>
<p><strong>Discussion anchors:</strong></p>
<ul>
<li>What is the deciding factor for Scenario A? (State persists and evolves across calls with no reassignment)</li>
<li>Why is <code>ComplexNumber</code> a value class? (Mathematical object with no identity — copies are cheap and natural)</li>
<li>Why is <code>Logger</code> a handle class? (Multiple callers must write into the same log — shared state is the point)</li>
</ul>
<p><strong>Teaching point:</strong> Default to value. Reach for handle when the object has identity and lifetime — when &quot;the same thing&quot; must change over time and be visible as changed from multiple places. <code>SensorDataAnalyzer</code> has both.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="eng6" lang="en-US" data-marpit-pagination="51" style="--paginate:true;--theme:eng6;" data-marpit-pagination-total="52">
<h2 id="what-you-can-do-now--lab-bridge">What You Can Do Now + Lab Bridge</h2>

<li>Read a <code>classdef</code> and identify its properties, access modifiers, constructor, and methods</li>
<li>Explain why a class beats loose scripts once state must persist and coordinate across steps</li>
<li>Decide whether a class should be value or handle and justify the decision</li>
<li>Choose public vs private access for a property and defend it in terms of invariants</li>
</ul>
<p><strong>Lab bridge — MP4:</strong></p>
<ul>

</section>
