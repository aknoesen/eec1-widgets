<h2 id="ryh-q1--diagnostic-opener">RYH Q1 — Diagnostic Opener</h2>
<p><strong>RAISE YOUR HAND AS THE OPTIONS ARE CALLED.</strong></p>
<div style="font-size:26px;margin-top:16px;background:#FDF3C8;border-left:4px solid #C99700;padding:14px 20px;font-style:italic;">
"A 9V battery is sitting on a table, not connected to anything. Which statement is correct?"
</div>
<div style="font-size:26px;margin-top:20px;line-height:2;">
A) &nbsp; There is voltage across the terminals and current flowing through it<br />
B) &nbsp; There is voltage across the terminals but no current flowing<br />
C) &nbsp; There is no voltage until it is connected to a circuit<br />
D) &nbsp; Voltage and current are the same thing
</div>
<p><em>We will come back to this again in this lecture.</em></p>

<h2 id="back-to-q1-voltage-without-current">Back to Q1: Voltage Without Current</h2>
<div style="display:grid;grid-template-columns:58% 42%;gap:24px;align-items:start;">
<div>
<p>The 9V battery on the table = a hill.</p>
<ul>
<li>Terminals = top and bottom of the hill</li>
<li>The <strong>height difference exists</strong> — that is the 9 V — whether or not a ball is rolling down it</li>
<li><strong>Voltage: yes. Current: no.</strong></li>
</ul>
<p>Current requires a completed path. Voltage does not.</p>
<blockquote>
<p>Voltage = potential difference    <em>(exists without current)</em></p>
<p>Current = charge in motion    <em>(requires a completed path)</em></p>
</blockquote>
<p><strong>Answer: B.</strong></p>
</div>
<div style="font-size:16px;background:#FDF3C8;border-left:4px solid #C99700;padding:14px 16px;border-radius:4px;">
<p><em>&quot;A 9V battery is sitting on a table, not connected to anything. Which statement is correct?&quot;</em></p>
<p>A)   Voltage across terminals and current flowing<br /><br />
B)   Voltage across terminals, no current<br /><br />
C)   No voltage until connected to a circuit<br /><br />
D)   Voltage and current are the same thing</p>
</div>
</div>
</section>

<h2 id="ryh-q2--checking-the-analogy">RYH Q2 — Checking the Analogy</h2>
<p><strong>RAISE YOUR HAND AS THE OPTIONS ARE CALLED.</strong></p>
<div style="font-size:26px;margin-top:16px;background:#FDF3C8;border-left:4px solid #C99700;padding:14px 20px;font-style:italic;">
"In the gravity analogy, voltage corresponds to:"
</div>
<div style="font-size:26px;margin-top:20px;line-height:2;">
A) &nbsp; The force on a ball rolling down the hill<br />
B) &nbsp; The difference in height between two points on the hill<br />
C) &nbsp; The speed of the ball at the bottom<br />
D) &nbsp; The mass of the ball
</div>

<h2 id="ryh-q3">RYH Q3</h2>
<p><strong>RAISE YOUR HAND AS THE OPTIONS ARE CALLED.</strong></p>
<div style="font-size:26px;margin-top:16px;background:#FDF3C8;border-left:4px solid #C99700;padding:14px 20px;font-style:italic;">
"If you move the ground reference to a different node in a circuit, which of the following changes?"
</div>
<div style="font-size:26px;margin-top:20px;line-height:2;">
A) &nbsp; The current through each resistor<br />
B) &nbsp; The voltage across each resistor<br />
C) &nbsp; The voltage at each node<br />
D) &nbsp; The power dissipated by each resistor
</div>
</section>

<h2 id="the-adalm2000-m2k">The ADALM2000 (M2K)</h2>
<p>Your primary instrument for the entire course. One device, five functions:</p>
<table>
<thead>
<tr>
<th>Function</th>
<th>Used in</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Oscilloscope</strong></td>
<td>Observe waveforms over time</td>
</tr>
<tr>
<td><strong>Waveform generator</strong></td>
<td>Produce test signals</td>
</tr>
<tr>
<td><strong>Power supply</strong></td>
<td>Set DC voltages (Lab 1 today)</td>
</tr>
<tr>
<td><strong>Voltmeter</strong></td>
<td>Measure DC voltages (Lab 1 today)</td>
</tr>
<tr>
<td><strong>Network analyzer</strong></td>
<td>Measure frequency response (later)</td>
</tr>
</tbody>
</table>
<p><strong>Today: power supply + voltmeter only.</strong></p>
<p>The UC Davis M2K Adaptor Board makes the M2K's signals accessible on a standard breadboard. <strong>Lab 2 depends on it — leaving Lab 1 without a completed, inspected board means you cannot do Lab 2.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="eec1" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:eec1;" data-marpit-pagination-total="22">
<h2 id="lab-1-five-parts">Lab 1: Five Parts</h2>
<table>
<thead>
<tr>
<th>Part</th>
<th>Activity</th>
</tr>
</thead>
<tbody>
<tr>
<td>1</td>
<td>Software verification — confirm M2K recognized by Scopy</td>
</tr>
<tr>
<td>2</td>
<td>Power supply — program personalized voltages</td>
</tr>
<tr>
<td>3</td>
<td>Voltmeter — single-ended and differential measurements</td>
</tr>
<tr>
<td>4</td>
<td><strong>Adaptor Board construction</strong> — solder edge connector and headers</td>
</tr>
<tr>
<td>5</td>
<td>Component collection — wires, resistors, capacitor for Labs 2 and 3</td>
</tr>
</tbody>
</table>
<p><em>Parts are not done in sequence — your group rotates to open stations.</em></p>
<p><strong>Read the full procedure before Tuesday.</strong> Pre-lab is due Tuesday noon.</p>
</section>

<h2 id="the-ai-pre-lab">The AI Pre-Lab</h2>
<p><strong>Pre-lab PL4:</strong> Use an LLM to research four terms:</p>
<ul>
<li>ADC, DAC, single-ended measurement, differential measurement</li>
</ul>
<p><strong>The model behavior:</strong></p>
<ol>
<li>Ask the LLM for a working definition</li>
<li>Verify it against the lab procedure</li>
<li>Submit what <em>you</em> understood — not what the LLM said word for word</li>
</ol>
